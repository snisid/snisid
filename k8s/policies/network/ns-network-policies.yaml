---
# Allow egress to kafka and cockroachdb for all NS services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-kafka-cockroach
  namespace: snisid-national-security
spec:
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - sigint-ht
      - humint-ht
      - air-defense-ht
      - mil-c2-ht
      - bio-surveillance-ht
      - executive-protection-ht
      - transport-security-ht
      - radiation-safety-svc
      - all-source-fusion-ht
      - counterintel-ht
      - critical-infra-protection-ht
      - fisa-court-svc
      - classification-mgmt-ht
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: snisid-data
      podSelector:
        matchLabels:
          app: kafka
    ports:
    - protocol: TCP
      port: 9092
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: snisid-data
      podSelector:
        matchLabels:
          app: cockroachdb
    ports:
    - protocol: TCP
      port: 26257
