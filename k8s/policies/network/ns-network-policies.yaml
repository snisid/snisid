---
# Default Deny-All Ingress for snisid-national-security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: snisid-national-security
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
# Allow DNS egress for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: snisid-national-security
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
# Allow frontend namespace to reach NS services on their respective ports
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-ingress
  namespace: snisid-national-security
spec:
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - air-defense-ht
      - mil-c2-ht
      - bio-surveillance-ht
      - executive-protection-ht
      - transport-security-ht
      - radiation-safety-svc
      - counterintel-ht
      - critical-infra-protection-ht
      - fisa-court-svc
      - classification-mgmt-ht
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: snisid-ingress
      podSelector:
        matchLabels:
          app: frontend
---
# Allow fisa-court-svc -> sigint-ht (8301)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-fisa-to-sigint
  namespace: snisid-national-security
spec:
  podSelector:
    matchLabels:
      app: sigint-ht
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: fisa-court-svc
    ports:
    - protocol: TCP
      port: 8301
---
