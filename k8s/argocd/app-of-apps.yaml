apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snisid-app-of-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/gov/snisid.git'
    targetRevision: HEAD
    path: k8s/argocd/apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
