apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snisid-core-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/gov/snisid.git'
    targetRevision: HEAD
    path: k8s/helm
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: snisid-core
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
