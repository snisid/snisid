---
apiVersion: kubeadm.k8s.io/v1beta3
kind: ClusterConfiguration
kubernetesVersion: v1.30.0
controlPlaneEndpoint: "api.cluster.snisid.gov:6443"
clusterName: "snisid-production"
apiServer:
  extraArgs:
    audit-policy-file: "/etc/kubernetes/audit-policy.yaml"
    audit-log-path: "/var/log/kubernetes/audit/audit.log"
    audit-log-maxage: "30"
    audit-log-maxbackup: "10"
    audit-log-maxsize: "100"
    encryption-provider-config: "/etc/kubernetes/etcd-encryption.yaml"
    # CIS Benchmarks
    profiling: "false"
    anonymous-auth: "false"
    authorization-mode: "Node,RBAC"
  extraVolumes:
    - name: audit-policy
      hostPath: "/etc/kubernetes/audit-policy.yaml"
      mountPath: "/etc/kubernetes/audit-policy.yaml"
      readOnly: true
      pathType: File
    - name: audit-log
      hostPath: "/var/log/kubernetes/audit"
      mountPath: "/var/log/kubernetes/audit"
      readOnly: false
      pathType: DirectoryOrCreate
    - name: etcd-encryption
      hostPath: "/etc/kubernetes/etcd-encryption.yaml"
      mountPath: "/etc/kubernetes/etcd-encryption.yaml"
      readOnly: true
      pathType: File
controllerManager:
  extraArgs:
    profiling: "false"
    terminated-pod-gc-threshold: "50"
scheduler:
  extraArgs:
    profiling: "false"
etcd:
  local:
    extraArgs:
      # Enforce TLS for etcd
      peer-client-cert-auth: "true"
      client-cert-auth: "true"
networking:
  dnsDomain: cluster.local
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
---
apiVersion: kubeadm.k8s.io/v1beta3
kind: InitConfiguration
localAPIEndpoint:
  advertiseAddress: "0.0.0.0"
  bindPort: 6443
nodeRegistration:
  kubeletExtraArgs:
    # CIS Benchmarks for kubelet
    anonymous-auth: "false"
    authorization-mode: "Webhook"
    protect-kernel-defaults: "true"
    read-only-port: "0"
