---
# ── Kafka Users (Service Accounts) ───────────────────────

apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: identity-service
  namespace: snisid-event-bus
  labels:
    strimzi.io/cluster: snisid-kafka
spec:
  authentication:
    type: tls
  authorization:
    type: simple
    acls:
    - resource:
        type: topic
        name: snisid-identity-
        patternType: prefix
      operations: [Read, Write, Create, Describe]
    - resource:
        type: group
        name: identity-service
        patternType: literal
      operations: [Read]

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: civil-registry-service
  namespace: snisid-event-bus
  labels:
    strimzi.io/cluster: snisid-kafka
spec:
  authentication:
    type: tls
  authorization:
    type: simple
    acls:
    - resource:
        type: topic
        name: snisid-civil-
        patternType: prefix
      operations: [Read, Write, Create, Describe]
    - resource:
        type: topic
        name: snisid-identity-deceased
        patternType: literal
      operations: [Read]   # Consommer les décès pour cascade
    - resource:
        type: group
        name: civil-registry-service
      operations: [Read]

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: fraud-engine
  namespace: snisid-event-bus
  labels:
    strimzi.io/cluster: snisid-kafka
spec:
  authentication:
    type: tls
  authorization:
    type: simple
    acls:
    - resource:
        type: topic
        name: snisid-
        patternType: prefix
      operations: [Read, Describe]   # Lire tout pour analyse fraude
    - resource:
        type: topic
        name: snisid-fraud-alerts
        patternType: literal
      operations: [Write]
    - resource:
        type: group
        name: fraud-engine
      operations: [Read]

---
# ── Schema Registry (Confluent / Apicurio) ────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-registry
  namespace: snisid-event-bus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: schema-registry
  template:
    metadata:
      labels:
        app: schema-registry
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: schema-registry
        image: harbor.snisid.gov.ht/apicurio/apicurio-registry-kafkasql:2.5.0
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "snisid-kafka-kafka-bootstrap.snisid-event-bus:9093"
        - name: REGISTRY_KAFKASQL_TOPIC
          value: "snisid-schema-registry"
        - name: QUARKUS_HTTP_PORT
          value: "8080"
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 1Gi
            cpu: 500m
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]

---
apiVersion: v1
kind: Service
metadata:
  name: schema-registry
  namespace: snisid-event-bus
spec:
  selector:
    app: schema-registry
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: schema-registry-pdb
  namespace: snisid-event-bus
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: schema-registry
