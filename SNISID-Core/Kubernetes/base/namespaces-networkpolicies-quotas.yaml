metadata:
  name: snisid-api-gateway
  labels:
    istio-injection: enabled
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    snisid.gov.ht/tier: platform
    snisid.gov.ht/data-classification: public
---
apiVersion: v1
kind: Namespace
metadata:
