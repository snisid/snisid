---
# ============================================================
# SNISID-Core — Kubernetes Base Layer
# Namespaces + Network Policies + Resource Quotas
# Document ID: SNISID-K8S-BASE-001
# Version: 1.0.0
# ============================================================

# ============================================================
# NAMESPACES
# ============================================================
apiVersion: v1
