        - "cluster.local/ns/snisid-national-security/sa/bio-surveillance-ht"
        - "cluster.local/ns/snisid-national-security/sa/executive-protection-ht"
        - "cluster.local/ns/snisid-national-security/sa/transport-security-ht"
        - "cluster.local/ns/snisid-national-security/sa/radiation-safety-svc"
        - "cluster.local/ns/snisid-national-security/sa/counterintel-ht"
        - "cluster.local/ns/snisid-national-security/sa/critical-infra-protection-ht"
        - "cluster.local/ns/snisid-national-security/sa/fisa-court-svc"
