---
# Deny-all default for snisid-national-security
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: ns-deny-all
  namespace: snisid-national-security
spec:
  selector:
    matchLabels: {}
  action: DENY
  rules:
  - to:
    - operation:
        notMethods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
---
# Allow DNS egress for all services
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: ns-allow-dns-egress
  namespace: snisid-national-security
spec:
  selector:
    matchLabels: {}
  action: ALLOW
  rules:
  - to:
    - operation:
        hosts: ["*.kube-system.svc.cluster.local"]
---
# sigint-ht: ingress from fisa-court-svc only (8301)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: sigint-ht-authz
  namespace: snisid-national-security
spec:
  selector:
    matchLabels:
      app: sigint-ht
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/snisid-national-security/sa/fisa-court-svc"]
    to:
    - operation:
        ports: ["8301"]
---
# humint-ht: ingress from all-source-fusion-ht only (8302)
apiVersion: security.istio.io/v1beta1
