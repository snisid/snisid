# SNISID — Local dev observability stack
# `docker compose -f docker-compose.observability.yml up -d`
# Grafana : http://localhost:3000 (admin / snisid-dev)
version: '3.9'

services:

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: snisid-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-remote-write-receiver
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/rules:/etc/prometheus/rules:ro
      - ../prometheus/alerts:/etc/prometheus/alerts:ro
      - prom-data:/prometheus
    ports: [ "9090:9090" ]
    environment:
      REGION: DEV-LOCAL

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: snisid-alertmanager
    volumes:
      - ../alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports: [ "9093:9093" ]

  loki:
    image: grafana/loki:3.2.0
    container_name: snisid-loki
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ../loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/var/loki
    ports: [ "3100:3100" ]

  tempo:
    image: grafana/tempo:2.6.0
    container_name: snisid-tempo
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ../tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports: [ "3200:3200", "4317:4317" ]

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: snisid-otelcol
    command: ["--config=/etc/otel/collector.yaml"]
    volumes:
      - ../otel/collector.yaml:/etc/otel/collector.yaml:ro
    ports:
      - "4318:4318"     # OTLP HTTP
      - "8888:8888"     # metrics
    depends_on: [prometheus, loki, tempo]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: snisid-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: snisid-dev
      GF_USERS_DEFAULT_THEME: dark
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor,publicDashboards
    volumes:
      - ../grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ../grafana/provisioning:/etc/grafana/provisioning/dashboards:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports: [ "3000:3000" ]
    depends_on: [prometheus, loki, tempo, alertmanager]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: snisid-node-exporter
    ports: [ "9100:9100" ]

  blackbox:
    image: prom/blackbox-exporter:v0.25.0
    container_name: snisid-blackbox
    ports: [ "9115:9115" ]

volumes:
  prom-data: {}
  loki-data: {}
  tempo-data: {}
  grafana-data: {}
