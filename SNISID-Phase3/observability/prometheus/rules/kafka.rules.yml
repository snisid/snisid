# SNISID — Kafka recording rules
groups:
  - name: snisid.kafka.health
    interval: 30s
    rules:
      - record: snisid:kafka_broker_count
        expr: count(kafka_server_brokertopicmetrics_messagesin_total)

      - record: snisid:kafka_messages_in:rate5m
        expr: sum by (topic) (rate(kafka_topic_partition_current_offset[5m]))

      - record: snisid:kafka_consumer_lag:max
        expr: max by (group, topic) (kafka_consumergroup_group_lag)

      - record: snisid:kafka_under_replicated_partitions:total
        expr: sum(kafka_under_replicated_partitions)

      - record: snisid:kafka_topic_size_bytes
        expr: sum by (topic) (kafka_log_log_size)

      - record: snisid:kafka_isr_shrinks:rate5m
        expr: sum(rate(kafka_server_replicamanager_isrshrinks_total[5m]))
