loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 3
  
  # Requirement #93: 1 Year Log Retention
  compactor:
    retention_enabled: true
    shared_store: s3
    retention_delete_delay: 2h
    retention_delete_worker_count: 150
  
  limits_config:
    retention_period: 8760h # 365 days * 24h
    enforce_metric_name: false
    reject_old_samples: true
    reject_old_samples_max_age: 168h
  
  # Object Storage Backend for infinite scale and compliance
  storage:
    type: s3
    bucketNames:
      chunks: snisid-loki-chunks
      ruler: snisid-loki-ruler
      admin: snisid-loki-admin
    s3:
      endpoint: s3.snisid-internal.svc.cluster.local
      region: us-east-1
      accessKeyId: "${S3_ACCESS_KEY}"
      secretAccessKey: "${S3_SECRET_KEY}"
      s3ForcePathStyle: true

promtail:
  enabled: true
  config:
    snippets:
      pipelineStages:
        - cri: {}
        # Extract trace_id and span_id if present in JSON logs for correlation
        - json:
            expressions:
              trace_id: trace_id
              span_id: span_id
        - labels:
            trace_id:
