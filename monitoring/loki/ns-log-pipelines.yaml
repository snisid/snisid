apiVersion: v1
kind: ConfigMap
metadata:
  name: ns-log-pipelines
  namespace: snisid-monitoring
  labels:
    app: ns-log-pipelines
data:
  ns-vc.yaml: |
    scrape_configs:
      - job_name: ns-vc
        pipeline_stages:
          - json:
              expressions:
                service: service
                level: level
                trace_id: trace_id
                operation: operation
                did: did
                credential_type: credential_type
                issuer: issuer
                subject: subject
                duration_ms: duration_ms
          - labels:
              service: ""
              level: ""
              operation: ""
              credential_type: ""

  ns-pki.yaml: |
    scrape_configs:
      - job_name: ns-pki
        pipeline_stages:
          - json:
              expressions:
                service: service
                level: level
                trace_id: trace_id
                operation: operation
                ca_id: ca_id
                certificate_type: certificate_type
                subject_dn: subject_dn
                validity_days: validity_days
          - labels:
              service: ""
              level: ""
              operation: ""
              certificate_type: ""

  ns-sd-jwt.yaml: |
    scrape_configs:
      - job_name: ns-sd-jwt
        pipeline_stages:
          - json:
              expressions:
                service: service
                level: level
                trace_id: trace_id
                operation: operation
                disclosure_count: disclosure_count
                holder: holder
                key_binding: key_binding
          - labels:
              service: ""
              level: ""
              operation: ""

  ns-did.yaml: |
    scrape_configs:
      - job_name: ns-did
        pipeline_stages:
          - json:
              expressions:
                service: service
                level: level
                trace_id: trace_id
                operation: operation
                method: method
                did: did
                document_version: document_version
          - labels:
              service: ""
              level: ""
              operation: ""
              method: ""

  ns-vp.yaml: |
    scrape_configs:
      - job_name: ns-vp
        pipeline_stages:
          - json:
              expressions:
                service: service
                level: level
                trace_id: trace_id
                operation: operation
                verifier: verifier
                presentation_type: presentation_type
                credential_count: credential_count
                verified: verified
          - labels:
              service: ""
              level: ""
              operation: ""
              verified: ""

  ns-status-list.yaml: |
    scrape_configs:
      - job_name: ns-status-list
        pipeline_stages:
          - json:
              expressions:
                service: service
                level: level
                trace_id: trace_id
                operation: operation
                status_type: status_type
