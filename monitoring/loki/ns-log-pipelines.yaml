          - labels:
              service: ""
              level: ""
              operation: ""

  ns-revocation.yaml: |
    scrape_configs:
      - job_name: ns-revocation
        pipeline_stages:
          - json:
              expressions:
                service: service
                level: level
                trace_id: trace_id
                operation: operation
                credential_id: credential_id
