                bitset_size: bitset_size
          - labels:
              service: ""
              level: ""
              operation: ""
              status_type: ""

  ns-didcomm.yaml: |
    scrape_configs:
      - job_name: ns-didcomm
        pipeline_stages:
          - json:
              expressions:
                service: service
                level: level
                trace_id: trace_id
                operation: operation
                msg_type: msg_type
                from_did: from_did
                to_did: to_did
                encrypted: encrypted
          - labels:
              service: ""
              level: ""
              operation: ""
              msg_type: ""

  ns-credential-flow.yaml: |
    scrape_configs:
      - job_name: ns-credential-flow
        pipeline_stages:
          - json:
              expressions:
                service: service
                level: level
                trace_id: trace_id
                operation: operation
                flow_id: flow_id
                step: step
                credential_type: credential_type
                issuer: issuer
                holder: holder
          - labels:
              service: ""
              level: ""
              operation: ""
              step: ""

  ns-siopv2.yaml: |
    scrape_configs:
      - job_name: ns-siopv2
        pipeline_stages:
