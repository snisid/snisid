              op_type: ""

  ns-wallet.yaml: |
    scrape_configs:
      - job_name: ns-wallet
        pipeline_stages:
          - json:
              expressions:
                service: service
                level: level
                trace_id: trace_id
                operation: operation
                wallet_id: wallet_id
                user_id: user_id
                credential_count: credential_count
                action: action
          - labels:
              service: ""
              level: ""
              operation: ""
              action: ""

  ns-chapi.yaml: |
    scrape_configs:
      - job_name: ns-chapi
        pipeline_stages:
          - json:
              expressions:
                service: service
