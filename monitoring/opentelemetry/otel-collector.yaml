apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: snisid-otel
  namespace: snisid-monitoring
spec:
  mode: deployment
  config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
      
      # Adaptive Sampling: Keep 100% of errors, but only 5% of healthy traffic to reduce costs
      tail_sampling:
        policies:
          - name: keep-all-errors
            type: status_code
            status_code:
              status_codes: [ERROR]
          - name: prob-sampling
            type: probabilistic
            probabilistic:
              sampling_percentage: 5

    exporters:
      # Send traces to Grafana Tempo
      otlp/tempo:
        endpoint: "tempo-distributor.snisid-monitoring.svc.cluster.local:4317"
        tls:
          insecure: true
      
      # Send metrics to Prometheus
      prometheus:
        endpoint: "0.0.0.0:8889"

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [tail_sampling, batch]
          exporters: [otlp/tempo]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
