groups:
- name: snisid-critical
  rules:
  - alert: ServiceDown
    expr: up{namespace="snisid"} == 0
    for: 30s
    labels:
      severity: critical
    annotations:
      summary: "Service {{ $labels.app }} is down"
  - alert: HighErrorRate
    expr: rate(http_requests_total{namespace="snisid", status=~"5.."}[5m]) > 0.05
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: "High error rate on {{ $labels.app }}"
  - alert: HighLatency
    expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{namespace="snisid"}[5m])) > 2
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High latency on {{ $labels.app }}"
  - alert: PodRestarting
    expr: rate(kube_pod_container_status_restarts_total{namespace="snisid"}[30m]) > 1
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Pod {{ $labels.pod }} is restarting frequently"
