# Default Deny All Traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: snisid-core
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

# Allow Nexus -> Identity Service (Targeted)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nexus-to-identity
  namespace: snisid-core
spec:
  podSelector:
    matchLabels:
      app: identity-service
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: nexus-orchestrator
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090 # gRPC
