# api-gateway.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "snisid.fullname" . }}-api-gateway
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  template:
    spec:
      containers:
        - name: api-gateway
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.apiGateway.image }}:{{ .Values.apiGateway.tag }}"
          ports:
            - containerPort: 8080
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
---
# case-engine.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "snisid.fullname" . }}-case-engine
spec:
  replicas: {{ .Values.caseEngine.replicaCount }}
  template:
    spec:
      containers:
        - name: case-engine
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.caseEngine.image }}:{{ .Values.caseEngine.tag }}"
          resources:
            {{- toYaml .Values.caseEngine.resources | nindent 12 }}
---
# ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "snisid.fullname" . }}
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: snisid.gov
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "snisid.fullname" . }}-api-gateway
            port:
              number: 80
