[global]
# Repository 1: Fast local/NFS storage for short-term recovery (7 days)
repo1-type=s3
repo1-s3-endpoint=s3.snisid-internal.svc.cluster.local
repo1-s3-bucket=snisid-pg-backups
repo1-s3-region=us-east-1
repo1-s3-key=vault_injected_access_key
repo1-s3-key-secret=vault_injected_secret_key
repo1-retention-full=7

# Repository 2: WORM storage for 90-day compliance retention
repo2-type=s3
repo2-s3-endpoint=s3.snisid-archive.svc.cluster.local
repo2-s3-bucket=snisid-pg-archive-worm
repo2-s3-region=us-east-1
repo2-s3-key=vault_injected_access_key
repo2-s3-key-secret=vault_injected_secret_key
repo2-retention-full=90

# Encryption (AES-256) at rest within the S3 bucket
repo1-cipher-type=aes-256-cbc
repo1-cipher-pass=vault_injected_cipher_password
repo2-cipher-type=aes-256-cbc
repo2-cipher-pass=vault_injected_cipher_password

# Performance & Network
process-max=4
compress-type=zst
compress-level=6
archive-async=y

[snisid_cluster]
pg1-path=/var/lib/postgresql/data
