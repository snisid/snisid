# Strict Host-Based Authentication configuration for SNISID PostgreSQL

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local connections (within pod)
local   all             postgres                                peer

# Reject any non-SSL remote connections instantly
host    all             all             0.0.0.0/0               reject

# Reject superuser from connecting remotely
hostssl all             postgres        0.0.0.0/0               reject

# Allow specific microservices via mTLS (clientcert=verify-full requires the client certificate to be signed by the CA)
hostssl snisid_db       identity_svc    10.244.0.0/16           scram-sha-256 clientcert=verify-full
hostssl snisid_db       biometric_svc   10.244.0.0/16           scram-sha-256 clientcert=verify-full
hostssl snisid_db       iam_svc         10.244.0.0/16           scram-sha-256 clientcert=verify-full

# Allow SOC/Auditors from secure management subnet (Read-Only access enforced by Roles)
hostssl snisid_db       auditor_role    192.168.20.0/24         scram-sha-256

# Fallback explicit deny
hostssl all             all             0.0.0.0/0               reject
