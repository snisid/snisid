# pgAudit Configuration for SNISID Postgres
# Loaded via shared_preload_libraries in patroni-values.yaml

# Enable pgAudit
pgaudit.log = 'write, ddl'

# Log all actions made by the schema_manager
pgaudit.role = 'schema_manager'

# Force logging of all statements (even if they fail)
pgaudit.log_level = 'log'
pgaudit.log_parameter = 'on'

# Format output for easy parsing by Fluent-Bit / SIEM
pgaudit.log_catalog = 'off'
pgaudit.log_client = 'on'
pgaudit.log_relation = 'on'
pgaudit.log_statement_once = 'off'

# Explicitly audit ALL read and write queries against the 'citizens' and 'biometric_templates' tables
# This is done by creating an audit role and granting access to the tables, then assigning that role to pgaudit.role
# CREATE ROLE audit_watchdog;
# GRANT SELECT, INSERT, UPDATE, DELETE ON citizens, biometric_templates TO audit_watchdog;
# ALTER SYSTEM SET pgaudit.role = 'audit_watchdog';
