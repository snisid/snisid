# SNISID — Citizen Intermediate CA Policy & Configuration
# Classification: TOP-SECRET
# Domain: Citizen digital identity, authentication, signatures
# Issuer: SNISID Root CA (offline ceremony)
# Path: Vault PKI mount `snisid-pki-citizen`
# HSM: Thales Luna 7 Core DC — Partition SNISID_CITIZEN_CA
# Privacy: RGPD-equivalent national strict — no biometric data in certificates

apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: snisid-citizen-intermediate-issuer
  namespace: snisid-identity
  labels:
    snisid.gov.tier: tier-0
    snisid.gov.service: pki-citizen
    snisid.gov.data-classification: top-secret
spec:
  vault:
    path: snisid-pki-citizen/issue/citizen-certs
    server: https://vault.snisid-identity.svc.cluster.local:8200
    auth:
      kubernetes:
        mountPath: /v1/auth/kubernetes
        role: cert-manager-citizen-ca
        secretRef:
          name: cert-manager-citizen-vault-auth
          key: token
    caBundle: |
      -----BEGIN CERTIFICATE-----
      <SNISID-CITIZEN-INTERMEDIATE-CA-CERT>
      -----END CERTIFICATE-----

---
# Vault PKI Mount Configuration: snisid-pki-citizen

vault_mount_config: |
  path = "snisid-pki-citizen"
  type = "pki"
  default_lease_ttl_seconds = 63115200   # 2 years default
  max_lease_ttl_seconds     = 94608000   # 3 years max (intermediate validity)

vault_policy_citizen_ca: |
  path "snisid-pki-citizen/issue/citizen-certs" {
    capabilities = ["create", "update"]
    # Restricted: only automated enrollment service can issue
  }
  path "snisid-pki-citizen/sign/citizen-certs" {
    capabilities = ["deny"]  # No manual signing for citizen certs
  }
  path "snisid-pki-citizen/revoke" {
    capabilities = ["create", "update"]
    # Revocation requires dual approval (enrollment service + backoffice)
  }
  path "snisid-pki-citizen/roles/citizen-certs" {
    capabilities = ["read"]
  }
  path "snisid-pki-citizen/cert/ca" {
    capabilities = ["read"]
  }
  path "snisid-pki-citizen/crl" {
    capabilities = ["read"]
  }

vault_pki_role_citizen_certs: |
  name = "citizen-certs"
  # Citizen identity is bound to national identifier (anonymized UUID in cert)
  # NO personal names in SANs. NO biometric references. NO addresses.
  allowed_domains = ["citizen.snisid.ht"]
  allow_subdomains = false
  allow_bare_domains = true
  allow_glob_domains = false
  allow_ip_sans = false
  allowed_uri_sans = ["urn:snisid:citizen:*"]
  allowed_serial_numbers = ["*"]
  max_ttl = "17520h"       # 2 years max end-entity (citizen cert)
  default_ttl = "8760h"    # 1 year default
  ttl = "8760h"
  key_type = "ec"
  key_bits = 384
  signature_algorithm = "ecdsa-with-SHA384"
  
  policy_identifiers = [
    "1.3.6.1.4.1.SNISID.1.2",      # SNISID Citizen Policy
    "1.3.6.1.4.1.SNISID.0.1",       # SNISID CP Nationale
    "2.23.140.1.2.2"                # CAB Forum Organization Validation equivalent
  ]
  
  key_usage = ["DigitalSignature", "NonRepudiation", "KeyEncipherment"]
  ext_key_usage = ["ClientAuth", "EmailProtection", "SmartcardLogon"]
  
  # Subject constraints (NO personal data in subject)
  require_cn = true
  allowed_user_ids = ["*"]  # Internal anonymized citizen UUID
  
  # Organization is fixed, OU contains citizen UUID (not PII)
  organization = ["SNISID Citizen Identity"]
  ou = ["{citizen-uuid}"]
  country = ["HT"]
  # NO locality, NO province (privacy protection)
  
  # CRL / OCSP
  crl = true
  crl_expiry = "24h"
  crl_disable = false
  crl_distribution_points = ["http://crl.snisid.gouv.local/citizen/ca.crl"]
  issuing_certificates = ["http://pki.snisid.gouv.local/citizen/ca.crt"]
  ocsp_servers = ["http://ocsp.snisid.gouv.local"]
  
  # Privacy: certificates are NOT published in public transparency log
  # (national PKI does not participate in public CT for citizen certs)
  no_store = false  # But access to cert store is RBAC-restricted

# HSM Key Reference
hsm_key_reference:
  partition: SNISID_CITIZEN_CA
  key_label: snisid-citizen-intermediate-ca-key
  algorithm: EC
  curve: secp384r1
  extractable: false
  modifiable: false
  key_type: PRIVATE_KEY
  storage: HSM
  # Privacy partition: isolated from Gov/Infra/Judicial keys

# Citizen Wallet Format (PKCS#12 / PFX)
citizen_wallet_format:
  container: PKCS#12
  encryption: AES-256-CBC (PBKDF2 100000 iterations minimum)
  mac_algorithm: SHA-384
  key_derivation: PBKDF2
  private_key_protection: Password + Biometric-derived key (template hash, NOT image)
  # Biometric-derived key: PBKDF2(password=PIN, salt=SHA-256(biometric_template_hash))
  # If biometric unavailable: offline recovery via enrollment station + ID document

# Offline Verification (QR Code / Barcode)
citizen_offline_verification:
  format: QR-Code (ISO/IEC 18004)
  content: |
    {
      "v": "snisid-citizen-v1",
      "cid": "{citizen-uuid}",
      "cert_hash": "sha384:{certificate_hash}",
      "sig": "base64:{signature_of_content_by_cert}",
      "ts": "{ISO8601-timestamp}",
      "exp": "{expiration-ISO8601}"
    }
  # QR signed by Citizen CA intermediate (short-lived signing sub-key)
  # Verification offline: Root CA public key embedded in verification app
  # No network required for basic integrity check
  # Full revocation check requires OCSP burst or USB CRL update
