# SNISID — National mTLS Model : Cryptographic Mutual Authentication
# Classification: SECRET
# Role: Définit les exigences mTLS pour TOUTES les communications nationales SNISID
# Extension de: infrastructure/networking/cilium/istio-gateway.yaml (Phase 4)

# ───────────────────────────────────────────────
# 1. Mesh-Wide mTLS STRICT Policy (Istio)
# ───────────────────────────────────────────────
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: snisid-mesh-wide-mtls-strict
  namespace: istio-system
  labels:
    snisid.gov.tier: tier-0
    snisid.gov.service: mtls-policy
spec:
  mtls:
    mode: STRICT
  # Applied mesh-wide via MESH scope (default namespace = istio-system with mesh scope)
  # All pods in all namespaces MUST present valid SPIFFE/SNISID certificate

---
# Tier-0 Exemption: Vault Identity cluster — mTLS + additional client cert validation
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: snisid-tier0-vault-mtls-strict
  namespace: snisid-identity
  labels:
    snisid.gov.tier: tier-0
    snisid.gov.service: mtls-vault
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vault
  mtls:
    mode: STRICT
  portLevelMtls:
    8200:
      mode: STRICT
    8201:
      mode: STRICT

---
# ───────────────────────────────────────────────
# 2. Authorization Policies — Service Identity Enforcement
# ───────────────────────────────────────────────
# Default deny ALL inter-service communication — explicit allow only
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: snisid-default-deny-all-services
  namespace: snisid-core
  labels:
    snisid.gov.tier: tier-1
    snisid.gov.service: authz-default
spec:
  {}
  # Empty spec = DENY all traffic not matched by another policy

---
# Core API — Allow ingress gateway + specific service identities
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: snisid-core-api-allow-ingress
  namespace: snisid-core
  labels:
    snisid.gov.tier: tier-1
    snisid.gov.service: authz-core-api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: snisid-core-api
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"
            namespaces:
              - "istio-system"
      to:
        - operation:
            methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
            paths: ["/api/v1/*", "/health/*"]
      when:
        - key: request.auth.audiences
          values: ["snisid-core-api"]
    - from:
        - source:
            namespaces:
              - "snisid-obs"
            principals:
              - "cluster.local/ns/snisid-obs/sa/prometheus"
      to:
        - operation:
            methods: ["GET"]
            paths: ["/metrics", "/health/*"]
    - from:
        - source:
            namespaces:
              - "snisid-bpmn"
            principals:
              - "cluster.local/ns/snisid-bpmn/sa/camunda-worker"
      to:
        - operation:
            methods: ["POST"]
            paths: ["/api/v1/workflow/*"]

---
# Kafka — mTLS + SASL/SCRAM inter-broker + client auth
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: snisid-kafka-mtls-allow
  namespace: snisid-data
  labels:
    snisid.gov.tier: tier-1
    snisid.gov.service: authz-kafka
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - "snisid-data"
            principals:
              - "cluster.local/ns/snisid-data/sa/kafka-broker"
      to:
        - operation:
            ports: ["9093"]
    - from:
        - source:
            namespaces:
              - "snisid-core"
              - "snisid-bpmn"
              - "snisid-edge-regional"
              - "snisid-edge-mobile"
            principals:
              - "cluster.local/ns/snisid-core/sa/snisid-core-api"
              - "cluster.local/ns/snisid-bpmn/sa/camunda-worker"
              - "cluster.local/ns/snisid-edge-regional/sa/edge-sync-consumer"
              - "cluster.local/ns/snisid-edge-mobile/sa/mobile-enrollment-agent"
      to:
        - operation:
            ports: ["9093"]

---
# Vault — Only specific service identities can authenticate
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: snisid-vault-mtls-allow
  namespace: snisid-identity
  labels:
    snisid.gov.tier: tier-0
    snisid.gov.service: authz-vault
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vault
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - "snisid-core"
              - "snisid-bpmn"
              - "snisid-data"
              - "snisid-obs"
              - "cert-manager"
              - "argocd"
              - "snisid-cyber"
            principals:
              - "cluster.local/ns/snisid-core/sa/snisid-core-api"
              - "cluster.local/ns/snisid-bpmn/sa/camunda-worker"
              - "cluster.local/ns/snisid-data/sa/kafka-client"
              - "cluster.local/ns/snisid-obs/sa/otel-collector"
              - "cluster.local/ns/cert-manager/sa/cert-manager"
              - "cluster.local/ns/argocd/sa/argocd-server"
      to:
        - operation:
            ports: ["8200"]
            methods: ["GET", "POST", "PUT", "DELETE"]
            paths: ["/v1/auth/*", "/v1/secret/*", "/v1/pki/*", "/v1/transit/*", "/v1/sys/health"]
    - from:
        - source:
            namespaces:
              - "snisid-identity"
            principals:
              - "cluster.local/ns/snisid-identity/sa/vault"
      to:
        - operation:
            ports: ["8201"]  # Raft internal

---
# ───────────────────────────────────────────────
# 3. Cilium NetworkPolicy — mTLS complement (L3/L4 enforcement)
# ───────────────────────────────────────────────
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: snisid-mtls-cilium-enforcement
  namespace: snisid-core
  labels:
    snisid.gov.tier: tier-1
    snisid.gov.service: mtls-cilium
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: snisid-core-api
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: istio-system
            k8s-app: istio-ingressgateway
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
          rules:
            http:
              - method: GET
                path: "/api/v1/*"
              - method: POST
                path: "/api/v1/*"
              - method: PUT
                path: "/api/v1/*"
              - method: DELETE
                path: "/api/v1/*"
              - method: GET
                path: "/health/*"
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: snisid-obs
            snisid.gov/service: prometheus
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
          rules:
            http:
              - method: GET
                path: "/metrics"
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: snisid-identity
            app.kubernetes.io/name: vault
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: snisid-data
            app.kubernetes.io/name: kafka
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: snisid-obs
            snisid.gov/service: otel-collector
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
            - port: "4318"
              protocol: TCP

---
# ───────────────────────────────────────────────
# 4. Edge Node mTLS (K3s + WireGuard + Device Certs)
# ───────────────────────────────────────────────
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: snisid-edge-mtls-enforcement
  namespace: snisid-edge-regional
  labels:
    snisid.gov.tier: tier-4
    snisid.gov.service: mtls-edge
spec:
  endpointSelector:
    matchLabels:
      snisid.gov/role: edge-regional
  ingress:
    - fromCIDR:
        - 10.1.0.0/16  # Core DC CIDR
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
            - port: "10250"
              protocol: TCP
            - port: "9093"
              protocol: TCP
        - ports:
            - port: "51871"
              protocol: UDP  # WireGuard Cilium
  egress:
    - toCIDR:
        - 10.1.0.0/16
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
            - port: "9093"
              protocol: TCP
        - ports:
            - port: "51871"
              protocol: UDP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP

---
# ───────────────────────────────────────────────
# 5. mTLS Certificate Requirements Matrix (Reference)
# ───────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: snisid-mtls-certificate-requirements
  namespace: istio-system
  labels:
    snisid.gov.tier: tier-0
    snisid.gov.service: mtls-standards
data:
  requirements.yaml: |
    mesh_mtls:
      protocol: "TLS 1.3 ONLY"
      cipher_suites:
        - "TLS_AES_256_GCM_SHA384"
        - "TLS_CHACHA20_POLY1305_SHA256"
      forbidden_versions: ["TLS 1.0", "TLS 1.1", "TLS 1.2", "SSLv3", "SSLv2"]
      certificate_source: "Istio SDS (Secret Discovery Service) via cert-manager + Vault PKI"
      certificate_ttl: "30 days"
      certificate_issuer: "snisid-pki-infra / mesh-mtls role"
      spiffe_id_format: "spiffe://snisid.gov/ns/{namespace}/sa/{serviceAccount}"
      spiffe_id_required: true
      sans:
        - "URI:spiffe://snisid.gov/ns/{namespace}/sa/{serviceAccount}"
        - "DNS:{service}.{namespace}.svc.cluster.local"
      certificate_algorithm: "ECDSA P-256 (performance)"
      hash_algorithm: "SHA-256"
      
    api_gateway_mtls:
      protocol: "TLS 1.3 ONLY"
      cipher_suites:
        - "TLS_AES_256_GCM_SHA384"
      certificate_source: "Istio Ingress Gateway + cert-manager (snisid-ingress-wildcard-tls)"
      certificate_ttl: "90 days"
      certificate_issuer: "snisid-pki-infra / cluster-local role"
      client_auth: "OPTIONAL for public APIs, REQUIRED for internal admin APIs"
      client_certificate_issuer: "snisid-pki-citizen OR snisid-pki-gov (depending on endpoint)"
      
    etcd_peer_mtls:
      protocol: "TLS 1.3"
      certificate_source: "kubeadm etcd PKI (managed by Kubernetes control plane)"
      certificate_issuer: "snisid-pki-infra / node-auth role (via custom controller)"
      client_auth: "REQUIRED"
      certificate_ttl: "90 days"
      
    kubelet_mtls:
      protocol: "TLS 1.3"
      certificate_source: "cert-manager + Vault PKI (node-auth role)"
      client_auth: "REQUIRED (kubelet client cert to API server, API server cert to kubelet)"
      certificate_ttl: "90 days"
      
    kafka_mtls:
      protocol: "TLS 1.3"
      certificate_source: "cert-manager + Vault PKI (Kafka cert issuer)"
      client_auth: "REQUIRED for all clients"
      sasl_mechanism: "SCRAM-SHA-512 (IN ADDITION to mTLS — defense in depth)"
      certificate_ttl: "90 days"
      
    vault_mtls:
      protocol: "TLS 1.3"
      certificate_source: "Vault self-signed cluster cert (internal PKI for Vault nodes)"
      client_auth: "REQUIRED for all Vault API consumers"
      certificate_ttl: "90 days"
      
    edge_wireguard:
      protocol: "Noise Protocol (WireGuard)"
      key_exchange: "Curve25519"
      authentication: "Pre-shared key + Device certificate (Infra CA)"
      encryption: "ChaCha20-Poly1305"
      perfect_forward_secrecy: true
      
    citizen_api_mtls:
      protocol: "TLS 1.3"
      client_auth: "REQUIRED for sensitive endpoints (biometric enrollment, identity update)"
      client_certificate_issuer: "snisid-pki-citizen"
      client_certificate_ttl: "2 years"
      fallback: "FIDO2/WebAuthn for mobile app (no client cert management burden on citizen)"
