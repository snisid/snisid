syntax = "proto3";

package snisid.bio_adn.v1;
option go_package = "github.com/snisid/snisid/SNISID-BIO-ADN/proto/bio_adn/v1";

import "google/protobuf/timestamp.proto";

service DNAProfileService {
    rpc CreateProfile(CreateProfileRequest) returns (CreateProfileResponse);
    rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
    rpc SearchByNIU(SearchByNIURequest) returns (SearchByNIUResponse);
    rpc UpdateStatus(UpdateStatusRequest) returns (UpdateStatusResponse);
}

service PersonRecordService {
    rpc CreateRecord(CreatePersonRecordRequest) returns (CreatePersonRecordResponse);
    rpc GetRecord(GetPersonRecordRequest) returns (GetPersonRecordResponse);
    rpc SearchByType(SearchByTypeRequest) returns (SearchByTypeResponse);
    rpc UpdateLocation(UpdateLocationRequest) returns (UpdateLocationResponse);
}

service PropertyRecordService {
    rpc CreateRecord(CreatePropertyRecordRequest) returns (CreatePropertyRecordResponse);
    rpc GetRecord(GetPropertyRecordRequest) returns (GetPropertyRecordResponse);
    rpc SearchByPlate(SearchByPlateRequest) returns (SearchByPlateResponse);
    rpc MarkRecovered(MarkRecoveredRequest) returns (MarkRecoveredResponse);
}

// ── DNA Profile Messages ──────────────────────────────────────────────

message CreateProfileRequest {
    string niu = 1;
    string profile_type = 2;
    string case_reference = 3;
    string lab_case_number = 4;
    string profile_hash = 5;
    string submitting_agency = 6;
    string submitting_officer = 7;
    string analysis_date = 8;
}

message CreateProfileResponse {
    string profile_id = 1;
    string status = 2;
    google.protobuf.Timestamp created_at = 3;
}

message GetProfileRequest {
    string profile_id = 1;
}

message GetProfileResponse {
    string profile_id = 1;
    string niu = 2;
    string profile_type = 3;
    string case_reference = 4;
    string lab_case_number = 5;
    string profile_hash = 6;
    string status = 7;
    string submitting_agency = 8;
    string submitting_officer = 9;
    string analysis_date = 10;
    bool is_active = 11;
    google.protobuf.Timestamp created_at = 12;
}

message SearchByNIURequest {
    string niu = 1;
}

message SearchByNIUResponse {
    repeated GetProfileResponse profiles = 1;
    int32 total_count = 2;
}

message UpdateStatusRequest {
    string profile_id = 1;
    string new_status = 2;
    string reason = 3;
}

message UpdateStatusResponse {
    bool success = 1;
    google.protobuf.Timestamp updated_at = 2;
}

// ── Person Record Messages ────────────────────────────────────────────

message CreatePersonRecordRequest {
    string niu = 1;
    string record_type = 2;
    int32 priority_level = 3;
    string subject_name = 4;
    repeated string subject_alias = 5;
    string subject_description = 6;
    repeated string photo_refs = 7;
    string last_known_location = 8;
    string last_known_dept = 9;
    string reporting_agency = 10;
}

message CreatePersonRecordResponse {
    string record_id = 1;
    string status = 2;
    google.protobuf.Timestamp created_at = 3;
}

message GetPersonRecordRequest {
    string record_id = 1;
}

message GetPersonRecordResponse {
    string record_id = 1;
    string niu = 2;
    string record_type = 3;
    string status = 4;
    int32 priority_level = 5;
    string subject_name = 6;
    repeated string subject_alias = 7;
    string subject_description = 8;
    repeated string photo_refs = 9;
    string last_known_location = 10;
    string last_known_dept = 11;
    string reporting_agency = 12;
    bool is_active = 13;
    google.protobuf.Timestamp created_at = 14;
}

message SearchByTypeRequest {
    string record_type = 1;
    int32 limit = 2;
}

message SearchByTypeResponse {
    repeated GetPersonRecordResponse records = 1;
    int32 total_count = 2;
}

message UpdateLocationRequest {
    string record_id = 1;
    string location = 2;
    string department = 3;
}

message UpdateLocationResponse {
    bool success = 1;
    google.protobuf.Timestamp updated_at = 2;
}

// ── Property Record Messages ──────────────────────────────────────────

message CreatePropertyRecordRequest {
    string record_type = 1;
    string item_description = 2;
    string serial_number = 3;
    string make = 4;
    string model = 5;
    string color = 6;
    string vin = 7;
    string plate_number = 8;
    string theft_date = 9;
    string theft_location = 10;
    string theft_dept = 11;
    string case_reference = 12;
    string reporting_agency = 13;
    string linked_person_niu = 14;
}

message CreatePropertyRecordResponse {
    string record_id = 1;
    string status = 2;
    google.protobuf.Timestamp created_at = 3;
}

message GetPropertyRecordRequest {
    string record_id = 1;
}

message GetPropertyRecordResponse {
    string record_id = 1;
    string record_type = 2;
    string status = 3;
    string item_description = 4;
    string serial_number = 5;
    string make = 6;
    string model = 7;
    string color = 8;
    string vin = 9;
    string plate_number = 10;
    string theft_date = 11;
    string theft_location = 12;
    string theft_dept = 13;
    string case_reference = 14;
    string reporting_agency = 15;
    string linked_person_niu = 16;
    bool is_active = 17;
    google.protobuf.Timestamp created_at = 18;
}

message SearchByPlateRequest {
    string plate_number = 1;
}

message SearchByPlateResponse {
    repeated GetPropertyRecordResponse records = 1;
    int32 total_count = 2;
}

message MarkRecoveredRequest {
    string record_id = 1;
    string recovery_location = 2;
    string recovered_by = 3;
}

message MarkRecoveredResponse {
    bool success = 1;
    google.protobuf.Timestamp updated_at = 2;
}
