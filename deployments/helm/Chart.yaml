apiVersion: v2
name: snisid
description: National Secure Identity & Intelligence System
type: application
version: 1.0.0
appVersion: "1.0.0"
dependencies:
  - name: postgresql
    version: 15.5.0
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: kafka
    version: 29.3.0
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
  - name: neo4j
    version: 5.20.0
    repository: https://helm.neo4j.com/
    condition: neo4j.enabled
