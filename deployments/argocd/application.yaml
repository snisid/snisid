apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snisid-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/snisid/platform.git
    targetRevision: HEAD
    path: deploy/helm
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: snisid
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
