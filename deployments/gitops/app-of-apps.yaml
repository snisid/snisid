apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snisid-infrastructure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/snisid/platform.git
    targetRevision: HEAD
    path: deployments/gitops
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snisid-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/snisid/platform.git
    targetRevision: HEAD
    path: deployments/helm/snisid-backend
  destination:
    server: https://kubernetes.default.svc
    namespace: snisid
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
