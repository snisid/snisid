apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: snisid-alert-rules
  namespace: monitoring
spec:
  groups:
    - name: snisid.rules
      rules:
        - alert: HighIdentityCreationLatency
          expr: histogram_quantile(0.99, sum by (le) (rate(identity_creation_latency_seconds_bucket[5m]))) > 0.5
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Identity creation latency is high (> 500ms)"
            description: "P99 latency for identity creation is {{ $value }}s"

        - alert: FraudEngineDown
          expr: up{job="fraud-engine"} == 0
          for: 30s
          labels:
            severity: critical
          annotations:
            summary: "Fraud Engine service is down"
            description: "Service fraud-engine has been down for more than 30 seconds."

        - alert: AIOpsAnomalyDetected
          expr: snisid_ai_ops_anomaly_score > 0.8
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "AIOps detected infrastructure anomaly"
            description: "The infrastructure health score is low (current: {{ $value }})."
