apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: snisid-core
  labels:
    app: auth-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: snisid/auth-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8082
        env:
        - name: PORT
          value: "8082"
        - name: ENV
          value: "prod"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: snisid-db-credentials
              key: postgres-url
        - name: REDIS_URL
          value: "redis-master:6379"
        - name: RSA_PRIVATE_KEY_PATH
          value: "/etc/auth/keys/private.pem"
        volumeMounts:
        - name: jwt-keys
          mountPath: "/etc/auth/keys"
          readOnly: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8082
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8082
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
      volumes:
      - name: jwt-keys
        secret:
          secretName: auth-jwt-keys
