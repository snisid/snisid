apiVersion: apps/v1
kind: Deployment
metadata:
  name: dipe-svc
  namespace: snisid-core
  labels:
    app: dipe-svc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dipe-svc
  template:
    metadata:
      labels:
        app: dipe-svc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8118"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: dipe-svc
        image: snisid/dipe-svc:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8118
        env:
        - name: PORT
          value: "8118"
        - name: ENV
          value: "prod"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: snisid-db-credentials
              key: postgres-url
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8118
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8118
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"