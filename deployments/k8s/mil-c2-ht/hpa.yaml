apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mil-c2-ht-hpa
  namespace: snisid-national-security
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mil-c2-ht
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
