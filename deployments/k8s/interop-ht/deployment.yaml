apiVersion: apps/v1
kind: Deployment
metadata:
  name: interop-ht
  namespace: snisid-core
  labels:
    app: interop-ht
spec:
  replicas: 2
  selector:
    matchLabels:
      app: interop-ht
  template:
    metadata:
      labels:
        app: interop-ht
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8208"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: interop-ht
        image: snisid/interop-ht:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8208
        env:
        - name: INTEROP_DB_HOST
          valueFrom:
            secretKeyRef:
              name: snisid-db-credentials
              key: cockroach-host
        - name: INTEROP_DB_PORT
          value: "26257"
        - name: INTEROP_DB_NAME
          value: "snisid_interop"
        - name: INTEROP_DB_USER
          valueFrom:
            secretKeyRef:
              name: snisid-db-credentials
              key: cockroach-user
        - name: INTEROP_DB_SSLMODE
          value: "disable"
        - name: INTEROP_KAFKA_BROKERS
          value: "kafka:9092"
        - name: INTEROP_SERVICE_PORT
          value: "8208"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8208
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8208
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
