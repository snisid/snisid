apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: expl-svc-hpa
  namespace: snisid-core
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: expl-svc
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75