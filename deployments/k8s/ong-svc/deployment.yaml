apiVersion: apps/v1
kind: Deployment
metadata:
  name: ong-svc
  namespace: snisid-core
  labels:
    app: ong-svc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ong-svc
  template:
    metadata:
      labels:
        app: ong-svc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8133"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: ong-svc
        image: snisid/ong-svc:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8133
        env:
        - name: PORT
          value: "8133"
        - name: ENV
          value: "prod"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: snisid-db-credentials
              key: postgres-url
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8133
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8133
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"