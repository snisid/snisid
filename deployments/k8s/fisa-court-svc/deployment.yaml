apiVersion: apps/v1
kind: Deployment
metadata:
  name: fisa-court-svc
  namespace: snisid-national-security
  labels:
    app: fisa-court-svc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fisa-court-svc
  template:
    metadata:
      labels:
        app: fisa-court-svc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8312"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: fisa-court-svc
        image: snisid/fisa-court-svc:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8312
        env:
        - name: PORT
          value: "8312"
        - name: ENV
          value: "prod"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: snisid-secrets
              key: jwt-secret
        - name: KAFKA_BROKER
          value: "kafka:9092"
        - name: FISA_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: snisid-db-credentials
              key: snisid_fisacourt-url
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8312
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8312
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
