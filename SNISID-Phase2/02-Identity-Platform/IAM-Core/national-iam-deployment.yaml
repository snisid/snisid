apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: snisid-keycloak-national
  namespace: snisid-identity-core
  labels:
    app: keycloak-national
    component: iam-core
    classification: top-secret
    version: "23.0.0"
  annotations:
    snisid.gouv.ht/criticality: "CRITIQUE-NATIONAL"
    snisid.gouv.ht/sla: "99.99%"
    snisid.gouv.ht/audit: "full"
    snisid.gouv.ht/backup: "continuous"
spec:
  serviceName: keycloak-national-headless
  replicas: 7
  selector:
    matchLabels:
      app: keycloak-national
  template:
    metadata:
      labels:
        app: keycloak-national
        security-zone: red
        snisid.gouv.ht/mtls-required: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
        snisid.gouv.ht/audit-log: "true"
    spec:
      serviceAccountName: snisid-identity-sa
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: ["keycloak-national"]
              topologyKey: "kubernetes.io/hostname"
      tolerations:
        - key: "workload"
          value: "identity-critical"
          effect: "NoSchedule"
          operator: "Equal"
      nodeSelector:
        security-zone: red
        workload-class: identity
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: pki-cert-validator
          image: snisid-registry.gouv.ht/tools/cert-validator:2.0.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Validation certificats PKI SNISID..."
              openssl verify -CAfile /pki/national-ca-chain.crt /certs/keycloak-server.crt
              if [ $? -ne 0 ]; then
                echo "ERREUR: Certificat invalide — Démarrage bloqué"
                exit 1
              fi
              echo "Certificats PKI validés avec succès"
          volumeMounts:
            - name: pki-certs
              mountPath: /pki
            - name: server-certs
              mountPath: /certs
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
        - name: db-migration-check
          image: snisid-registry.gouv.ht/tools/db-checker:2.0.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Vérification base données Identity..."
              pg_isready -h $DB_HOST -p $DB_PORT -U $DB_USER
              if [ $? -ne 0 ]; then
                echo "ERREUR: Base données inaccessible"
                exit 1
              fi
              echo "Base données prête"
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: identity-db-credentials
                  key: host
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: identity-db-credentials
                  key: username
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: keycloak-national
          image: snisid-registry.gouv.ht/identity/keycloak-national:23.0.0-snisid
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
            - name: management
              containerPort: 9000
              protocol: TCP
            - name: cluster
              containerPort: 7800
              protocol: TCP
          env:
            - name: KC_HTTP_ENABLED
              value: "false"
            - name: KC_HTTPS_CERTIFICATE_FILE
              value: "/certs/keycloak-server.crt"
            - name: KC_HTTPS_CERTIFICATE_KEY_FILE
              value: "/certs/keycloak-server.key"
            - name: KC_HTTPS_PROTOCOLS
              value: "TLSv1.3"
            - name: KC_HTTPS_CIPHER_SUITES
              value: "TLS_AES_256_GCM_SHA384,TLS_CHACHA20_POLY1305_SHA256"
            - name: KC_DB
              value: "postgres"
            - name: KC_DB_URL
              valueFrom:
                secretKeyRef:
                  name: identity-db-credentials
                  key: jdbc-url
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: identity-db-credentials
                  key: username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: identity-db-credentials
                  key: password
            - name: KC_CACHE
              value: "ispn"
            - name: KC_CACHE_STACK
              value: "kubernetes"
            - name: jgroups.dns.query
              value: "keycloak-national-headless.snisid-identity-core.svc.cluster.local"
            - name: KC_FEATURES
              value: "token-exchange,admin-fine-grained-authz,par,dpop"
            - name: KC_PROXY
              value: "reencrypt"
            - name: KC_HOSTNAME
              value: "identity.snisid.gouv.ht"
            - name: KC_LOG_LEVEL
              value: "INFO,org.keycloak.events:DEBUG"
            - name: KC_LOG_FORMAT
              value: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c] (%t) %s%e%n"
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-credentials
                  key: username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-credentials
                  key: password
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
            limits:
              cpu: "16"
              memory: "32Gi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
              scheme: HTTPS
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 10
          startupProbe:
            httpGet:
              path: /health/started
              port: 9000
              scheme: HTTPS
            failureThreshold: 30
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: server-certs
              mountPath: /certs
              readOnly: true
            - name: pki-certs
              mountPath: /pki
              readOnly: true
            - name: keycloak-data
              mountPath: /opt/keycloak/data
            - name: keycloak-themes
              mountPath: /opt/keycloak/themes
              readOnly: true
            - name: keycloak-providers
              mountPath: /opt/keycloak/providers
              readOnly: true
        - name: audit-logger
          image: snisid-registry.gouv.ht/security/audit-agent:2.0.0
          env:
            - name: AUDIT_DESTINATION
              value: "kafka://kafka.snisid-kafka.svc:9093/topic/identity-audit"
            - name: AUDIT_LEVEL
              value: "FULL"
            - name: LOG_ENCRYPTION
              value: "AES-256-GCM"
            - name: SIGNING_KEY_PATH
              value: "/audit-keys/signing.key"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: audit-keys
              mountPath: /audit-keys
              readOnly: true
            - name: keycloak-log-shared
              mountPath: /logs
        - name: envoy-mtls-proxy
          image: snisid-registry.gouv.ht/infra/envoy:1.28.0
          args: ["--config-path", "/etc/envoy/envoy.yaml"]
          ports:
            - name: envoy-https
              containerPort: 10443
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
            - name: server-certs
              mountPath: /certs
              readOnly: true
            - name: pki-certs
              mountPath: /pki
              readOnly: true
      volumes:
        - name: server-certs
          secret:
            secretName: identity-server-tls
            items:
              - key: tls.crt
                path: keycloak-server.crt
              - key: tls.key
                path: keycloak-server.key
        - name: pki-certs
          secret:
            secretName: national-pki-chain
        - name: pki-client-certs
          secret:
            secretName: identity-client-tls
        - name: keycloak-themes
          configMap:
            name: keycloak-national-themes
        - name: keycloak-providers
          configMap:
            name: keycloak-national-providers
        - name: envoy-config
          configMap:
            name: identity-envoy-config
        - name: keycloak-log-shared
          emptyDir: {}
        - name: audit-keys
          secret:
            secretName: audit-signing-keys
  volumeClaimTemplates:
    - metadata:
        name: keycloak-data
        labels:
          classification: top-secret
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "snisid-encrypted-nvme"
        resources:
          requests:
            storage: "500Gi"
