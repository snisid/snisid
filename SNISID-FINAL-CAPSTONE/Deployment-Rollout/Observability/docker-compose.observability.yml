version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: snisid_prometheus
    volumes:
      - ./prometheus_rules.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - snisid_observability

  grafana:
    image: grafana/grafana:latest
    container_name: snisid_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin_snisid
    volumes:
      - ./grafana_dashboard.json:/var/lib/grafana/dashboards/grafana_dashboard.json
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - snisid_observability

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: snisid_otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel_collector_config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP http receiver
      - "8889:8889"   # Prometheus exporter metrics
    networks:
      - snisid_observability

networks:
  snisid_observability:
    driver: bridge
