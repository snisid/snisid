apiVersion: apps/v1
kind: Deployment
metadata:
  name: executive-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: executive-api
  template:
    metadata:
      labels:
        app: executive-api
    spec:
      containers:
      - name: api
        image: snisid/executive-api:latest
        ports:
        - containerPort: 8080
