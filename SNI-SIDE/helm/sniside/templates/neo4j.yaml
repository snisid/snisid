{{- if .Values.neo4j.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: sniside
spec:
  serviceName: neo4j
  replicas: {{ .Values.neo4j.coreNodes | default 3 }}
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      serviceAccountName: sniside-sa
      containers:
        - name: neo4j
          image: {{ .Values.neo4j.image | default "neo4j:5-enterprise" }}
          ports:
            - containerPort: 7687
              name: bolt
            - containerPort: 7474
              name: http
          env:
            - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
              value: "yes"
            - name: NEO4J_EDITION
              value: "enterprise"
            - name: NEO4J_AUTH
              value: "neo4j/{{ .Values.postgresql.auth.password }}"
            - name: NEO4J_server_memory_heap_initial__size
              value: "16G"
            - name: NEO4J_server_memory_heap_max__size
              value: "32G"
            - name: NEO4J_server_memory_pagecache_size
              value: "16G"
            - name: NEO4J_dbms_tx__state_max__off__heap__memory
              value: "8G"
            - name: NEO4J_dbms_default__listen__address
              value: "0.0.0.0"
            - name: NEO4J_causal__clustering_expected__core__cluster__size
              value: "{{ .Values.neo4j.coreNodes | default 3 }}"
            - name: NEO4J_causal__clustering_initial__discovery__members
              value: "neo4j-0.neo4j.sniside:5000,neo4j-1.neo4j.sniside:5000,neo4j-2.neo4j.sniside:5000"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: plugins
              mountPath: /plugins
          resources:
            {{- toYaml .Values.neo4j.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.neo4j.persistence.size | default "2Ti" }}
    - metadata:
        name: plugins
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: "10Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: sniside
spec:
  clusterIP: None
  ports:
    - port: 7687
      name: bolt
    - port: 7474
      name: http
    - port: 5000
      name: discovery
  selector:
    app: neo4j
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-read
  namespace: sniside
spec:
  ports:
    - port: 7687
      name: bolt
  selector:
    app: neo4j
{{- end }}
