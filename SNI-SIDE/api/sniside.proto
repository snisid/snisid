// ============================================================
// SNI-SIDE: gRPC Service Definitions
// Protocol Buffers v3
// ============================================================

syntax = "proto3";

package sniside.intelligence.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/snisid/sniside/api/intelligence/v1;intelligencev1";
option java_package = "ht.snisid.sniside.intelligence.v1";

// ============ NATIONAL SOVEREIGN SEARCH ENGINE ============
service NationalSearchService {
    // Unified search across all 15 databases
    rpc UnifiedSearch(UnifiedSearchRequest) returns (UnifiedSearchResponse);

    // Graph intelligence search (Neo4j)
    rpc GraphSearch(GraphSearchRequest) returns (GraphSearchResponse);

    // Federated search across multiple databases
    rpc FederatedSearch(FederatedSearchRequest) returns (FederatedSearchResponse);

    // Cross-reference search (find all connected data for an entity)
    rpc CrossReference(CrossReferenceRequest) returns (CrossReferenceResponse);

    // Stream search results in real-time
    rpc StreamSearch(StreamSearchRequest) returns (stream SearchResult);
}

// ============ NCID — CRIMINAL INTELLIGENCE ============
service NCIDService {
    rpc SearchWantedPersons(WantedPersonSearchRequest) returns (WantedPersonSearchResponse);
    rpc GetWantedPerson(GetWantedPersonRequest) returns (WantedPerson);
    rpc CreateWantedPerson(CreateWantedPersonRequest) returns (WantedPerson);
    rpc UpdateWantedPerson(UpdateWantedPersonRequest) returns (WantedPerson);
    rpc GetPersonWarrants(GetPersonWarrantsRequest) returns (WarrantList);
    rpc GetPersonAliases(GetPersonAliasesRequest) returns (AliasList);
    rpc SearchCriminalCases(CriminalCaseSearchRequest) returns (CriminalCaseSearchResponse);
    rpc GetCriminalCase(GetCriminalCaseRequest) returns (CriminalCase);
    rpc SearchGangs(GangSearchRequest) returns (GangSearchResponse);
    rpc SearchOrganizations(OrganizationSearchRequest) returns (OrganizationSearchResponse);
    rpc SearchInterpolNotices(InterpolNoticeSearchRequest) returns (InterpolNoticeSearchResponse);
    rpc GetCriminalNetwork(GetCriminalNetworkRequest) returns (CriminalNetwork);
    rpc LinkPersonToCase(LinkPersonToCaseRequest) returns (LinkPersonToCaseResponse);
}

// ============ HN-NGI — BIOMETRICS ============
service BiometricService {
    rpc VerifyBiometric1to1(VerifyBiometricRequest) returns (VerifyBiometricResponse);
    rpc IdentifyBiometric1toN(IdentifyBiometricRequest) returns (IdentifyBiometricResponse);
    rpc SearchFace(FaceSearchRequest) returns (FaceSearchResponse);
    rpc SearchFingerprint(FingerprintSearchRequest) returns (FingerprintSearchResponse);
    rpc SearchIris(IrisSearchRequest) returns (IrisSearchResponse);
    rpc SearchVoice(VoiceSearchRequest) returns (VoiceSearchResponse);
    rpc SearchPalm(PalmSearchRequest) returns (PalmSearchResponse);
    rpc DetectDuplicates(DuplicateDetectionRequest) returns (DuplicateDetectionResponse);
    rpc EnrollBiometric(EnrollBiometricRequest) returns (EnrollBiometricResponse);
}

// ============ HN-CODIS — DNA ============
service CODISTService {
    rpc SearchDNAProfiles(DNASearchRequest) returns (DNASearchResponse);
    rpc SearchExactDNA(ExactDNASearchRequest) returns (ExactDNASearchResponse);
    rpc SearchFamilialDNA(FamilialDNASearchRequest) returns (FamilialDNASearchResponse);
    rpc SearchMissingPersonDNA(MissingPersonDNASearchRequest) returns (MissingPersonDNASearchResponse);
    rpc CreateDNAProfile(CreateDNAProfileRequest) returns (DNAProfile);
    rpc RecordDNAMatch(RecordDNAMatchRequest) returns (DNAMatch);
}

// ============ MISSING PERSONS ============
service MissingPersonsService {
    rpc SearchMissingPersons(MissingPersonSearchRequest) returns (MissingPersonSearchResponse);
    rpc GetMissingPerson(GetMissingPersonRequest) returns (MissingPerson);
    rpc ReportMissingPerson(ReportMissingPersonRequest) returns (MissingPerson);
    rpc ReportSighting(ReportSightingRequest) returns (Sighting);
    rpc GetSightings(GetSightingsRequest) returns (SightingList);
    rpc TriggerAlert(TriggerAlertRequest) returns (TriggerAlertResponse);
    rpc ResolveCase(ResolveMissingCaseRequest) returns (ResolveMissingCaseResponse);
}

// ============ VEHICLE INTELLIGENCE ============
service VehicleIntelligenceService {
    rpc SearchVehicles(VehicleSearchRequest) returns (VehicleSearchResponse);
    rpc GetVehicleByVIN(GetVehicleByVINRequest) returns (Vehicle);
    rpc GetVehicleByPlate(GetVehicleByPlateRequest) returns (Vehicle);
    rpc GetOwnershipHistory(GetOwnershipHistoryRequest) returns (OwnershipHistoryList);
    rpc GetVehicleNetwork(GetVehicleNetworkRequest) returns (VehicleNetwork);
    rpc ReportStolenVehicle(ReportStolenVehicleRequest) returns (StolenVehicleReport);
}

// ============ ALPR ============
service ALPRService {
    rpc SearchALPRReads(ALPRSearchRequest) returns (ALPRSearchResponse);
    rpc GetALPRRead(GetALPRReadRequest) returns (ALPRRead);
    rpc AnalyzeRoute(RouteAnalysisRequest) returns (RouteAnalysis);
    rpc GetHeatmapData(HeatmapRequest) returns (HeatmapResponse);
    rpc GetCrossBorderTracking(CrossBorderRequest) returns (CrossBorderResponse);
    rpc IngestALPRRead(IngestALPRReadRequest) returns (IngestALPRReadResponse);
    rpc StreamALPRReads(stream ALPRRead) returns (StreamALPRResponse);
}

// ============ FIREARMS INTELLIGENCE ============
service FirearmsIntelligenceService {
    rpc SearchFirearms(FirearmSearchRequest) returns (FirearmSearchResponse);
    rpc GetFirearmBySerial(GetFirearmBySerialRequest) returns (Firearm);
    rpc SearchBallisticEvidence(BallisticSearchRequest) returns (BallisticSearchResponse);
    rpc RecordBallisticMatch(RecordBallisticMatchRequest) returns (BallisticMatch);
}

// ============ BORDER INTELLIGENCE ============
service BorderIntelligenceService {
    rpc SearchBorderCrossings(BorderCrossingSearchRequest) returns (BorderCrossingSearchResponse);
    rpc GetTravelerHistory(GetTravelerHistoryRequest) returns (TravelerHistory);
    rpc SearchVisas(VisaSearchRequest) returns (VisaSearchResponse);
    rpc BiometricBorderSearch(BiometricBorderSearchRequest) returns (BiometricBorderSearchResponse);
    rpc RecordBorderCrossing(RecordBorderCrossingRequest) returns (BorderCrossing);
}

// ============ COUNTER NARCOTICS ============
service CounterNarcoticsService {
    rpc SearchRoutes(NarcoticsRouteSearchRequest) returns (NarcoticsRouteSearchResponse);
    rpc SearchSeizures(SeizureSearchRequest) returns (SeizureSearchResponse);
    rpc SearchVessels(VesselSearchRequest) returns (VesselSearchResponse);
    rpc SearchAircraft(AircraftSearchRequest) returns (AircraftSearchResponse);
    rpc SearchCartels(CartelSearchRequest) returns (CartelSearchResponse);
    rpc RecordSeizure(RecordSeizureRequest) returns (Seizure);
}

// ============ FINANCIAL CRIME ============
service FinancialCrimeService {
    rpc SearchTransactions(TransactionSearchRequest) returns (TransactionSearchResponse);
    rpc GetTransaction(GetTransactionRequest) returns (SuspiciousTransaction);
    rpc SearchBeneficialOwners(BeneficialOwnerSearchRequest) returns (BeneficialOwnerSearchResponse);
    rpc SearchPEPs(PEPSearchRequest) returns (PEPSearchResponse);
    rpc RunAMLAnalysis(AMLAnalysisRequest) returns (AMLAnalysisResponse);
    rpc GetFinancialNetwork(GetFinancialNetworkRequest) returns (FinancialNetwork);
}

// ============ CYBERCRIME ============
service CybercrimeService {
    rpc SearchIOCs(IOCSearchRequest) returns (IOCSearchResponse);
    rpc BulkSubmitIOCs(BulkIOCSubmitRequest) returns (BulkIOCSubmitResponse);
    rpc SearchThreatActors(ThreatActorSearchRequest) returns (ThreatActorSearchResponse);
    rpc SearchMalware(MalwareSearchRequest) returns (MalwareSearchResponse);
    rpc SearchCryptoWallets(CryptoWalletSearchRequest) returns (CryptoWalletSearchResponse);
    rpc SearchCyberIncidents(CyberIncidentSearchRequest) returns (CyberIncidentSearchResponse);
}

// ============ WATCHLIST ============
service WatchlistService {
    rpc UniversalSearch(WatchlistSearchRequest) returns (WatchlistSearchResponse);
    rpc GetWatchlistEntry(GetWatchlistEntryRequest) returns (WatchlistEntry);
    rpc CreateWatchlistEntry(CreateWatchlistEntryRequest) returns (WatchlistEntry);
    rpc GetWatchlistMatches(WatchlistMatchLogRequest) returns (WatchlistMatchLogResponse);
}

// ============ DOCUMENT FRAUD ============
service DocumentFraudService {
    rpc SearchDocuments(DocumentSearchRequest) returns (DocumentSearchResponse);
    rpc VerifyDocument(VerifyDocumentRequest) returns (VerifyDocumentResponse);
    rpc GetFraudReports(FraudReportSearchRequest) returns (FraudReportSearchResponse);
    rpc ReportDocumentFraud(ReportDocumentFraudRequest) returns (DocumentFraudReport);
}

// ============ GEOINT ============
service GEOINTService {
    rpc GetHotspots(HotspotRequest) returns (HotspotResponse);
    rpc GetRiskZones(RiskZoneRequest) returns (RiskZoneResponse);
    rpc GeospatialSearch(GeospatialSearchRequest) returns (GeospatialSearchResponse);
    rpc GetDroneIntelligence(DroneIntelRequest) returns (DroneIntelResponse);
}

// ============ DIGITAL EVIDENCE ============
service DigitalEvidenceService {
    rpc SearchEvidence(EvidenceSearchRequest) returns (EvidenceSearchResponse);
    rpc GetEvidence(GetEvidenceRequest) returns (EvidenceItem);
    rpc UploadEvidence(stream EvidenceChunk) returns (UploadEvidenceResponse);
    rpc DownloadEvidence(DownloadEvidenceRequest) returns (stream EvidenceChunk);
    rpc SearchEvidenceFaces(EvidenceFaceSearchRequest) returns (EvidenceFaceSearchResponse);
    rpc SearchEvidenceObjects(EvidenceObjectSearchRequest) returns (EvidenceObjectSearchResponse);
    rpc SearchEvidenceOCR(EvidenceOCRSearchRequest) returns (EvidenceOCRSearchResponse);
    rpc MultimodalSearch(MultimodalSearchRequest) returns (MultimodalSearchResponse);
}

// ============ NATIONAL AI FUSION CENTER ============
service AIFusionService {
    rpc AnalyzeFraud(FraudAnalysisRequest) returns (FraudAnalysisResponse);
    rpc PredictCrime(CrimePredictionRequest) returns (CrimePredictionResponse);
    rpc DetectDeepfake(DeepfakeDetectionRequest) returns (DeepfakeDetectionResponse);
    rpc RunAMLRisk(AMLRiskRequest) returns (AMLRiskResponse);
    rpc DetectInsiderThreat(InsiderThreatRequest) returns (InsiderThreatResponse);
    rpc GraphRAGQuery(GraphRAGQueryRequest) returns (GraphRAGQueryResponse);
    rpc AnalyzeBehavioral(BehavioralAnalysisRequest) returns (BehavioralAnalysisResponse);
    rpc GetModelHealth(ModelHealthRequest) returns (ModelHealthResponse);
}

// ============ ALERT SERVICE ============
service AlertService {
    rpc GetAlerts(AlertListRequest) returns (AlertListResponse);
    rpc AcknowledgeAlert(AcknowledgeAlertRequest) returns (AcknowledgeAlertResponse);
    rpc ResolveAlert(ResolveAlertRequest) returns (ResolveAlertResponse);
    rpc SubscribeToAlerts(AlertSubscriptionRequest) returns (stream Alert);
}

// ============ MESSAGES ============

// --- Unified Search ---
message UnifiedSearchRequest {
    string query = 1;
    enum SearchType { ALL = 0; NAME = 1; NIU = 2; PHOTO = 3; FINGERPRINT = 4; DNA = 5; PHONE = 6; EMAIL = 7; ADDRESS = 8; PLATE = 9; VIN = 10; PASSPORT = 11; CASE = 12; }
    SearchType type = 2;
    repeated string databases = 3;
    int32 page = 4;
    int32 limit = 5;
    bool fuzzy = 6;
    string agency_context = 7;
}

message UnifiedSearchResponse {
    string query = 1;
    int32 total_results = 2;
    int32 page = 3;
    map<string, SearchResultGroup> results = 4;
    GraphSummary graph = 5;
    double search_duration_ms = 6;
}

message SearchResultGroup {
    int32 total = 1;
    repeated google.protobuf.Value items = 2;
}

message GraphSummary {
    repeated GraphNode nodes = 1;
    repeated GraphEdge edges = 2;
    int32 depth = 3;
}

message GraphNode {
    string id = 1;
    string label = 2;
    string type = 3;
    map<string, string> properties = 4;
    double risk_score = 5;
}

message GraphEdge {
    string source = 1;
    string target = 2;
    string relationship = 3;
    double weight = 4;
    map<string, string> properties = 5;
}

// --- Graph Search ---
message GraphSearchRequest {
    string query = 1;
    string niu = 2;
    string phone = 3;
    string plate = 4;
    int32 depth = 5;
    repeated string relationship_types = 6;
    bool include_risk_scores = 7;
}

message GraphSearchResponse {
    repeated GraphNode nodes = 1;
    repeated GraphEdge edges = 2;
    double centrality_score = 3;
    int32 network_size = 4;
    repeated string detected_patterns = 5;
    string analysis_summary = 6;
}

// --- Federated Search ---
message FederatedSearchRequest {
    string query = 1;
    repeated string database_names = 2;
    int32 timeout_seconds = 3;
    bool require_biometric_consent = 4;
}

message FederatedSearchResponse {
    string search_id = 1;
    map<string, FederatedDatabaseResult> database_results = 2;
    int32 total_federated_results = 3;
    double total_duration_ms = 4;
}

message FederatedDatabaseResult {
    string database_name = 1;
    int32 result_count = 2;
    double query_duration_ms = 3;
    string status = 4;
    repeated google.protobuf.Value results = 5;
    string error_message = 6;
}

// --- Cross Reference ---
message CrossReferenceRequest {
    string entity_type = 1;
    string entity_id = 2;
    int32 depth = 3;
    repeated string database_scope = 4;
}

message CrossReferenceResponse {
    string entity_id = 1;
    string entity_type = 2;
    repeated CrossReferenceLink links = 3;
    GraphSummary graph = 4;
    string intelligence_summary = 5;
}

message CrossReferenceLink {
    string target_type = 1;
    string target_id = 2;
    string target_name = 3;
    string relationship = 4;
    string source_database = 5;
    double confidence = 6;
}

// --- Stream Search ---
message StreamSearchRequest {
    string query = 1;
    repeated string databases = 2;
    bool continuous = 3;
}

message SearchResult {
    string database = 1;
    string result_type = 2;
    google.protobuf.Value data = 3;
    double score = 4;
    google.protobuf.Timestamp timestamp = 5;
}

// --- NCID Messages ---
message WantedPerson {
    string niu = 1;
    string full_name = 2;
    string alias = 3;
    google.protobuf.Timestamp date_of_birth = 4;
    string nationality = 5;
    string risk_level = 6;
    string status = 7;
    repeated Warrant warrants = 8;
    repeated Alias aliases = 9;
    repeated string gang_affiliations = 10;
    repeated InterpolNotice interpol_notices = 11;
    double risk_score = 12;
    google.protobuf.Timestamp created_at = 13;
    google.protobuf.Timestamp updated_at = 14;
}

message Warrant {
    string warrant_id = 1;
    string warrant_type = 2;
    string issuing_authority = 3;
    string person_niu = 4;
    string case_id = 5;
    repeated string charges = 6;
    string status = 7;
    google.protobuf.Timestamp issued_date = 8;
    google.protobuf.Timestamp expiry_date = 9;
    string risk_level = 10;
}

message Alias {
    string alias_id = 1;
    string alias_name = 2;
    string alias_type = 3;
    google.protobuf.Timestamp first_used = 4;
    google.protobuf.Timestamp last_used = 5;
}

message InterpolNotice {
    string notice_id = 1;
    string notice_type = 2;
    string person_name = 3;
    string nationality = 4;
    string issuing_country = 5;
    repeated string charges = 6;
    string status = 7;
    google.protobuf.Timestamp issued_date = 8;
}

message CriminalCase {
    string case_id = 1;
    string case_number = 2;
    string case_type = 3;
    string status = 4;
    string lead_agency = 5;
    string description = 6;
    google.protobuf.Timestamp incident_date = 7;
    string location = 8;
    double latitude = 9;
    double longitude = 10;
    repeated string involved_persons = 11;
    google.protobuf.Timestamp created_at = 12;
}

// --- Biometric Messages ---
message VerifyBiometricRequest {
    string niu = 1;
    string biometric_type = 2;
    bytes template_data = 3;
    double threshold = 4;
}

message VerifyBiometricResponse {
    bool verified = 1;
    double match_score = 2;
    double threshold = 3;
    string gallery_id = 4;
    int32 search_duration_ms = 5;
}

message IdentifyBiometricRequest {
    string biometric_type = 1;
    bytes template_data = 2;
    string gallery_id = 3;
    int32 max_candidates = 4;
    double threshold = 5;
}

message IdentifyBiometricResponse {
    repeated BiometricCandidate candidates = 1;
    int32 gallery_size = 2;
    int32 search_duration_ms = 3;
}

message BiometricCandidate {
    string niu = 1;
    string full_name = 2;
    double score = 3;
    int32 rank = 4;
}

// --- DNA Messages ---
message DNAProfile {
    string profile_id = 1;
    string profile_type = 2;
    string niu = 3;
    string sample_id = 4;
    string laboratory_id = 5;
    string profile_quality = 6;
    google.protobuf.Timestamp collection_date = 7;
    string status = 8;
    google.protobuf.Timestamp created_at = 9;
}

message DNAMatch {
    string match_id = 1;
    string profile_id_1 = 2;
    string profile_id_2 = 3;
    string match_type = 4;
    double match_probability = 5;
    double random_match_probability = 6;
    string relationship = 7;
    string status = 8;
}

// --- ALPR Messages ---
message ALPRRead {
    string read_id = 1;
    string plate_text = 2;
    string plate_country = 3;
    string camera_code = 4;
    double latitude = 5;
    double longitude = 6;
    google.protobuf.Timestamp read_timestamp = 7;
    int32 speed_kmh = 8;
    string vehicle_make = 9;
    string vehicle_model = 10;
    string vehicle_color = 11;
    double ocr_confidence = 12;
    bool alert_triggered = 13;
}

// --- Watchlist Messages ---
message WatchlistEntry {
    string entry_id = 1;
    string watchlist_type = 2;
    string entry_category = 3;
    string value_primary = 4;
    string full_name = 5;
    string niu = 6;
    string document_number = 7;
    string phone_number = 8;
    string vehicle_plate = 9;
    string risk_level = 10;
    string listing_authority = 11;
    string reason = 12;
    string status = 13;
    google.protobuf.Timestamp created_at = 14;
}

// --- Alert Messages ---
message Alert {
    string alert_id = 1;
    string source = 2;
    string alert_type = 3;
    string severity = 4;
    string title = 5;
    string description = 6;
    repeated string entity_ids = 7;
    string status = 8;
    google.protobuf.Timestamp created_at = 9;
    string created_by = 10;
    google.protobuf.Timestamp acknowledged_at = 11;
    string acknowledged_by = 12;
    string resolution = 13;
}

// --- AI Fusion Messages ---
message GraphRAGQueryRequest {
    string natural_language_query = 1;
    string seed_entity_id = 2;
    string seed_entity_type = 3;
    int32 graph_depth = 4;
    bool include_risk_analysis = 5;
}

message GraphRAGQueryResponse {
    string analysis = 1;
    repeated GraphNode context_nodes = 2;
    repeated GraphEdge context_edges = 3;
    double overall_risk_score = 4;
    repeated string key_findings = 5;
    double confidence = 6;
    map<string, double> entity_risk_scores = 7;
}

// --- Health & Status ---
message ModelHealthRequest {
    string model_name = 1;
}

message ModelHealthResponse {
    string model_name = 1;
    string model_version = 2;
    string status = 3;
    double latency_p50_ms = 4;
    double latency_p99_ms = 5;
    int32 requests_per_minute = 6;
    double error_rate = 7;
    double gpu_utilization = 8;
    int64 memory_usage_bytes = 9;
    google.protobuf.Timestamp last_trained = 10;
    double accuracy_metric = 11;
}

// --- Request wrappers (for single-ID lookups) ---
message GetWantedPersonRequest { string niu = 1; }
message GetPersonWarrantsRequest { string niu = 1; }
message GetPersonAliasesRequest { string niu = 1; }
message GetCriminalCaseRequest { string case_id = 1; }
message GetVehicleByVINRequest { string vin = 1; }
message GetVehicleByPlateRequest { string plate = 1; }
message GetALPRReadRequest { string read_id = 1; }
message GetMissingPersonRequest { string missing_id = 1; }
message GetFirearmBySerialRequest { string serial = 1; }
message GetTravelerHistoryRequest { string passport = 1; }
message GetTransactionRequest { string transaction_id = 1; }
message GetWatchlistEntryRequest { string entry_id = 1; }
message GetEvidenceRequest { string evidence_id = 1; }
message DownloadEvidenceRequest { string evidence_id = 1; }

// --- Response list wrappers ---
message WarrantList { repeated Warrant warrants = 1; }
message AliasList { repeated Alias aliases = 1; }
message SightingList { repeated Sighting sightings = 1; }

// --- Sighting message ---
message Sighting {
    string sighting_id = 1;
    string missing_id = 2;
    google.protobuf.Timestamp sighting_date = 3;
    string sighting_location = 4;
    double latitude = 5;
    double longitude = 6;
    string source_type = 7;
    double confidence_score = 8;
    string status = 9;
}

// --- Search request/response pairs ---
message WantedPersonSearchRequest {
    string name = 1; string alias = 2; string niu = 3;
    string nationality = 4; string risk_level = 5; string status = 6;
    int32 page = 7; int32 limit = 8;
}
message WantedPersonSearchResponse { repeated WantedPerson data = 1; int32 total = 2; int32 page = 3; }

message CreateWantedPersonRequest { WantedPerson person = 1; }
message UpdateWantedPersonRequest { WantedPerson person = 1; }

message CriminalCaseSearchRequest { string case_number = 1; string case_type = 2; string status = 3; string agency = 4; google.protobuf.Timestamp date_from = 5; google.protobuf.Timestamp date_to = 6; int32 page = 7; int32 limit = 8; }
message CriminalCaseSearchResponse { repeated CriminalCase data = 1; int32 total = 2; }

message GangSearchRequest { string name = 1; string territory = 2; string risk_level = 3; }
message GangSearchResponse { repeated Gang gangs = 1; }
message Gang { string gang_id = 1; string name = 2; string territory = 3; repeated string activities = 4; string risk_level = 5; int32 member_count = 6; string status = 7; }

message OrganizationSearchRequest { string name = 1; string type = 2; string country = 3; }
message OrganizationSearchResponse { repeated CriminalOrganization orgs = 1; }
message CriminalOrganization { string org_id = 1; string name = 2; string type = 3; string country = 4; string status = 5; string risk_level = 6; }

message InterpolNoticeSearchRequest { string notice_type = 1; string name = 2; string nationality = 3; string status = 4; }
message InterpolNoticeSearchResponse { repeated InterpolNotice notices = 1; }

message GetCriminalNetworkRequest { string seed_niu = 1; int32 depth = 2; }
message CriminalNetwork { string network_id = 1; repeated GraphNode nodes = 2; repeated GraphEdge edges = 3; double centrality_score = 4; }

message LinkPersonToCaseRequest { string niu = 1; string case_id = 2; string role = 3; }
message LinkPersonToCaseResponse { bool success = 1; string link_id = 2; }

// Face/Fingerprint/Iris/Voice search messages
message FaceSearchRequest { bytes image = 1; double min_confidence = 2; int32 max_results = 3; }
message FaceSearchResponse { repeated BiometricCandidate candidates = 1; }
message FingerprintSearchRequest { bytes image = 1; string finger_position = 2; double min_confidence = 3; }
message IrisSearchRequest { bytes image = 1; string iris_position = 2; }
message VoiceSearchRequest { bytes audio = 1; string language = 2; }
message PalmSearchRequest { bytes image = 1; string palm_position = 2; }

message DuplicateDetectionRequest { string biometric_type = 1; double threshold = 2; int32 max_comparisons = 3; }
message DuplicateDetectionResponse { repeated DuplicateResult duplicates = 1; }
message DuplicateResult { string niu_1 = 1; string niu_2 = 2; double score = 3; string biometric_type = 4; }

message EnrollBiometricRequest { string niu = 1; string biometric_type = 2; bytes template_data = 3; string enrollment_location = 4; }
message EnrollBiometricResponse { string enrollment_id = 1; bool success = 2; string status = 3; }

message DNASearchRequest { string profile_type = 1; string sample_id = 2; string niu = 3; }
message DNASearchResponse { repeated DNAProfile profiles = 1; }
message ExactDNASearchRequest { repeated string alleles = 1; double min_confidence = 2; }
message ExactDNASearchResponse { repeated DNAMatch matches = 1; }
message FamilialDNASearchRequest { string profile_id = 1; string relationship = 2; double min_threshold = 3; }
message FamilialDNASearchResponse { repeated DNAMatch matches = 1; }
message MissingPersonDNASearchRequest { string profile_id = 1; }
message CreateDNAProfileRequest { DNAProfile profile = 1; }
message RecordDNAMatchRequest { DNAMatch match = 1; }
message RecordDNAMatchResponse { DNAMatch match = 1; }

message MissingPersonSearchRequest { string name = 1; string case_type = 2; string status = 3; string risk_level = 4; int32 page = 5; int32 limit = 6; }
message MissingPersonSearchResponse { repeated MissingPerson data = 1; int32 total = 2; }
message MissingPerson { string missing_id = 1; string full_name = 2; string case_type = 3; google.protobuf.Timestamp last_seen = 4; string last_seen_location = 5; string status = 6; string risk_level = 7; repeated Sighting sightings = 8; }

message ReportMissingPersonRequest { MissingPerson person = 1; }
message ReportSightingRequest { Sighting sighting = 1; }
message GetSightingsRequest { string missing_id = 1; }
message TriggerAlertRequest { string missing_id = 1; string alert_type = 2; repeated string channels = 3; }
message TriggerAlertResponse { string alert_id = 1; bool triggered = 2; }
message ResolveMissingCaseRequest { string missing_id = 1; string resolution = 2; string found_status = 3; }
message ResolveMissingCaseResponse { bool success = 1; }

message VehicleSearchRequest { string vin = 1; string plate = 2; string owner_niu = 3; string make = 4; string model = 5; int32 year = 6; string status = 7; int32 page = 8; int32 limit = 9; }
message VehicleSearchResponse { repeated Vehicle data = 1; int32 total = 2; }
message Vehicle { string vehicle_id = 1; string vin = 2; string plate = 3; string make = 4; string model = 5; int32 year = 6; string color = 7; string owner_niu = 8; string owner_name = 9; string status = 10; }

message GetOwnershipHistoryRequest { string vin = 1; }
message OwnershipHistoryList { repeated OwnershipRecord records = 1; }
message OwnershipRecord { string owner_niu = 1; string owner_name = 2; google.protobuf.Timestamp ownership_start = 3; google.protobuf.Timestamp ownership_end = 4; }

message GetVehicleNetworkRequest { string vin = 1; int32 depth = 2; }
message VehicleNetwork { string vin = 1; repeated GraphNode persons = 2; repeated GraphNode vehicles = 3; repeated GraphNode phones = 4; repeated GraphEdge connections = 5; }

message ReportStolenVehicleRequest { string vin = 1; google.protobuf.Timestamp theft_date = 2; string theft_location = 3; string reporting_agency = 4; }
message StolenVehicleReport { string theft_id = 1; string status = 2; }

message ALPRSearchRequest { string plate = 1; string camera_id = 2; google.protobuf.Timestamp date_from = 3; google.protobuf.Timestamp date_to = 4; int32 page = 5; int32 limit = 6; }
message ALPRSearchResponse { repeated ALPRRead data = 1; int32 total = 2; }
message RouteAnalysisRequest { string plate = 1; google.protobuf.Timestamp date_from = 2; google.protobuf.Timestamp date_to = 3; }
