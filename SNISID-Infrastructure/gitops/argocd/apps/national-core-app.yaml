# SNISID — ArgoCD : National Core API Application
# Classification: RESTREINT DEFENSE
# Source: Git national, branch main, path helm/snisid-core

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snisid-core-api
  namespace: argocd
  labels:
    snisid.gov.tier: "tier-1"
    snisid.gov.region: "core"
    snisid.gov.service: "core-api"
    snisid.gov.owner: "equipe-nationale"
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    snisid.gov.data-classification: "restricted"
finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: snisid-national
  source:
    repoURL: "https://git.interne.snisid.gouv.local/applications/national.git"
    targetRevision: "main"
    path: "helm/snisid-core"
    helm:
      valueFiles:
        - "values-core-prod.yaml"
      parameters:
        - name: "replicaCount"
          value: "5"
        - name: "image.registry"
          value: "registry.interne.snisid.gouv.local"
        - name: "image.tag"
          value: "v2026.05.25-stable"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: snisid-core
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
    managedNamespaceMetadata:
      labels:
        istio-injection: enabled
        snisid.gov.tier: tier-1
        snisid.gov.region: core
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas  # HPA gère le scaling
  revisionHistoryLimit: 10
