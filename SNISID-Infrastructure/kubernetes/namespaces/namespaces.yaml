# SNISID — Namespaces Kubernetes : Gouvernance & Ségrégation Nationale
# Classification: RESTREINT DEFENSE
# Role: Définition namespaces officiels SNISID avec Pod Security Standards, labels obligatoires

# ───────────────────────────────────────────────
# TIER-0 : IAM / Identity / Vault / PKI / HSM
# Segregation maximale. Deny-all. mTLS STRICT. HSM access only.
# ───────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: snisid-identity
  labels:
    snisid.gov/tier: tier-0
    snisid.gov/region: core
    snisid.gov/service: identity
    snisid.gov/owner: equipe-identity
    snisid.gov/data-classification: top-secret
    istio-injection: enabled
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
    # Privileged required pour Vault sidecar HSM access (device mounts virtuels)
  annotations:
    snisid.gov.classification: "TOP-SECRET"
    snisid.gov.approvers: "IGC,Direction-Cyber"
    snisid.gov.network-policy: "strict-deny-all-explicit-allow-only"

---
