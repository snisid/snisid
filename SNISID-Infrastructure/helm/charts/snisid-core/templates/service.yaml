apiVersion: v1
kind: Service
metadata:
  name: {{ include "snisid-core.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "snisid-core.labels" . | nindent 4 }}
  annotations:
    snisid.gov/tier: {{ .Values.podLabels.tier | default "tier-1" | quote }}
    snisid.gov/service: {{ .Values.podLabels.service | default "core-api" | quote }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: {{ .Values.service.name }}
      # Istio sidecar interception
      appProtocol: http
  selector:
    {{- include "snisid-core.selectorLabels" . | nindent 4 }}
