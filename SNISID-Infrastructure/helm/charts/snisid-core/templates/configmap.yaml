apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "snisid-core.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "snisid-core.labels" . | nindent 4 }}
data:
  SNISID_REGION: {{ .Values.env | default list | toYaml | nindent 4 }}
  config.yaml: |
    server:
      port: 8080
      read_timeout: 30s
      write_timeout: 30s
      max_header_bytes: 1048576
    security:
      tls_required: true
      mtls_mode: strict
      min_tls_version: "1.3"
      allowed_cipher_suites:
        - "TLS_AES_256_GCM_SHA384"
        - "TLS_CHACHA20_POLY1305_SHA256"
    logging:
      format: json
      level: info
      fields:
        - timestamp
        - level
        - message
        - trace_id
        - snisid_tier
        - snisid_region
        - snisid_service
    observability:
      metrics_enabled: true
      tracing_enabled: true
      health_endpoints:
        live: "/health/live"
        ready: "/health/ready"
        startup: "/health/startup"
