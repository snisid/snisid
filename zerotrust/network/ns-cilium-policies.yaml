---
# sigint-ht: Ingress from fisa-court-svc only (8301). Egress to kafka, cockroach.
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: sigint-ht-policy
  namespace: snisid-national-security
spec:
  endpointSelector:
    matchLabels:
      app: sigint-ht
  ingress:
  - fromEndpoints:
    - matchLabels:
        app: fisa-court-svc
    toPorts:
    - ports:
      - port: "8301"
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        app: kafka
        namespace: snisid-data
    toPorts:
    - ports:
      - port: "9092"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        app: cockroachdb
        namespace: snisid-data
    toPorts:
    - ports:
      - port: "26257"
        protocol: TCP
  - toCIDR:
    - 10.0.0.0/8
    toPorts:
    - ports:
      - port: "9092"
        protocol: TCP
  - toCIDR:
    - 10.0.0.0/8
    toPorts:
    - ports:
      - port: "26257"
        protocol: TCP
---
