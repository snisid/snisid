# Basic ModSecurity Configuration
SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off

# Limit request body sizes to match API Gateway constraints
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 131072

# PCRE tuning
SecPcreMatchLimit 100000
SecPcreMatchLimitRecursion 100000

# Log format
SecAuditEngine RelevantOnly
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /dev/stdout # Forwarded via Kong container logs to SIEM

# Include OWASP Core Rule Set (CRS)
# Assuming CRS files are mounted to the container
Include /etc/modsecurity/crs/crs-setup.conf
Include /etc/modsecurity/crs/rules/*.conf

# Custom SNISID Exception Rules (False Positive Tuning)
# Example: Allow large JSON payloads on biometric endpoint without triggering SQLi alarms on raw base64
SecRule REQUEST_URI "@beginsWith /api/v1/biometrics/extract" \
    "id:10001,phase:1,pass,nolog,ctl:ruleEngine=Off"
