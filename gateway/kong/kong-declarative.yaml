_format_version: "3.0"

# --- GLOBAL PLUGINS (Zero Trust Baseline) ---
plugins:
  - name: prometheus
    enabled: true
  - name: bot-detection
    enabled: true
  - name: request-size-limiting
    config:
      allowed_payload_size: 10 # Block payloads > 10MB globally
  - name: http-log
    config:
      http_endpoint: "http://logstash-service.snisid-security.svc.cluster.local:8080"
      method: "POST"
      timeout: 10000
      keepalive: 60000

# --- SERVICES & ROUTES ---
services:
  - name: identity-service
    url: http://snisid-backend.snisid-core.svc.cluster.local:8000
    retries: 3
    connect_timeout: 5000
    write_timeout: 5000
    read_timeout: 5000
    routes:
      - name: identity-api-v1
        paths:
          - /api/v1/identity
        strip_path: false
    plugins:
      # Mandatory Authentication
      - name: jwt
        config:
          key_claim_name: iss
          claims_to_verify: ["exp", "nbf"]
          run_on_preflight: false
      # Rate Limiting (Strict)
      - name: rate-limiting
        config:
          second: 5
          minute: 100
          policy: local
          fault_tolerant: true
          hide_client_headers: false

  - name: biometric-service
    url: http://snisid-biometric.snisid-core.svc.cluster.local:8000
    routes:
      - name: biometric-api-v1
        paths:
          - /api/v1/biometrics
        strip_path: false
    plugins:
      - name: jwt
      # Biometrics endpoints are computationally expensive, tighter rate limits
      - name: rate-limiting
        config:
          second: 2
          minute: 20
          policy: local

