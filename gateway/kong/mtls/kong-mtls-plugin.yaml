apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: mtls-auth
  namespace: snisid-ingress
  labels:
    global: "false"
config:
  ca_certificates: 
    - "snisid-root-ca-id" # Reference to the CA cert loaded in Kong
  skip_consumer_lookup: true
  cache_ttl: 60
plugin: mtls-auth
---
# Example binding to an Ingress via annotations
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: snisid-critical-ingress
  namespace: snisid-core
  annotations:
    konghq.com/plugins: "mtls-auth"
    # Ensure standard HTTPS traffic is redirected or blocked
    konghq.com/protocols: "https"
spec:
  ingressClassName: kong
  rules:
  - host: secure.snisid.gov
    http:
      paths:
      - path: /api/v1/admin
        pathType: Prefix
        backend:
          service:
            name: snisid-backend
            port:
              number: 8000
