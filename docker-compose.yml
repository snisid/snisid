# SNISID — Docker Compose Development Environment
version: "3.8"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # --- Database ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: snisid
      POSTGRES_USER: snisid
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snisid"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging

  cockroach:
    image: cockroachdb/cockroach:latest-v24.1
    command: start-single-node --insecure
    ports:
      - "${COCKROACH_PORT:-26257}:26257"
      - "8081:8080"
    volumes:
      - cockroach_data:/cockroach/cockroach-data
    logging: *default-logging

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-dev_password}
      NEO4J_dbms_memory_pagecache_size: 512M
    ports:
      - "${NEO4J_PORT:-7687}:7687"
      - "7474:7474"
    volumes:
      - neo4j_data:/data
    logging: *default-logging

  # --- Message Queue ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    logging: *default-logging

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    logging: *default-logging

  # --- Vector Database (Biometrics) ---
  milvus:
    image: milvusdb/milvus:v2.4-latest
    ports:
      - "${MILVUS_PORT:-19530}:19530"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus_data:/var/lib/milvus
    logging: *default-logging

  etcd:
    image: quay.io/coreos/etcd:v3.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    command: >
      etcd --listen-client-urls http://0.0.0.0:2379
           --advertise-client-urls http://0.0.0.0:2379

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?error}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # --- Analytics ---
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "${CLICKHOUSE_PORT:-9000}:9000"
      - "8123:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    logging: *default-logging

  # --- Backend Services ---
  identity-api:
    build:
      context: .
      dockerfile: services/identity-api/Dockerfile
    ports:
      - "8081:8080"
    environment:
      APP_ENV: ${APP_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: snisid
      DB_USER: snisid
      DB_PASSWORD: ${DB_PASSWORD:-dev_password}
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    logging: *default-logging

  fraud-engine:
