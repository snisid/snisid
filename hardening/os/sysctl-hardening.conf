# SNISID Kernel Hardening (CIS Benchmark & ANSSI Compliant)
# /etc/sysctl.d/99-snisid-hardening.conf

# 1. Network Routing & IP Spoofing Protection
# Disable IP forwarding unless explicitly serving as a router (K8s nodes may need this overridden per-interface)
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# Enable source validation by reversed path, as specified in RFC1812
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Do not accept source routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# 2. ICMP & Redirect Protections
# Ignore ICMP redirects
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# Do not send ICMP redirects (we are not a router)
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Ignore bogus ICMP errors
net.ipv4.icmp_ignore_bogus_error_responses = 1

# 3. TCP/IP SYN Flood Protection
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 2048
net.ipv4.tcp_synack_retries = 2

# 4. Kernel and Memory Hardening
# Restrict dmesg access to root only
kernel.dmesg_restrict = 1

# Restrict use of ptrace (prevent attaching debuggers to processes)
kernel.yama.ptrace_scope = 2

# Enable ASLR (Address Space Layout Randomization)
kernel.randomize_va_space = 2

# Disable magic SysRq key
kernel.sysrq = 0
