# SNISID NGINX Ingress Strict TLS 1.3 Enforcement
# Fulfills Requirement #123: "TLS 1.3 exclusif (pas de TLS 1.2 en production)"

# 1. Disable all older protocols natively
ssl_protocols TLSv1.3;

# 2. Enforce only the strongest TLS 1.3 Cipher Suites
ssl_ciphers TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256;
ssl_prefer_server_ciphers off; # In TLS 1.3, client ordering is respected securely

# 3. HTTP Strict Transport Security (HSTS)
# Enforce HTTPS globally for 1 year (31536000 seconds), including subdomains
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# 4. Global Security Headers
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; object-src 'none';" always;

# 5. Session Parameters
ssl_session_cache shared:MozSSL:10m;  # ~40000 sessions
ssl_session_tickets off;
ssl_session_timeout 1d;

# 6. Diffie-Hellman parameters (Not heavily used in TLS 1.3, but good for completeness)
# ssl_dhparam /etc/nginx/dhparam.pem;
