openapi: 3.1.0
info:
  title: SNISID MCP Gateway
  version: 1.0.0
paths:
  /mcp:
    post:
      summary: Streamable HTTP MCP endpoint
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: x-correlation-id
          in: header
          required: true
          schema: { type: string }
        - name: x-purpose
          in: header
          required: true
          schema: { type: string }
        - name: x-device-id
          in: header
          required: true
          schema: { type: string }
      responses:
        '200': { description: MCP JSON-RPC response }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '429': { description: Rate limited }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
