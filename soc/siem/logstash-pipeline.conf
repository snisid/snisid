input {
  kafka {
    bootstrap_servers => "kafka-broker.snisid-core.svc.cluster.local:9092"
    topics => ["snisid.raw.logs", "snisid.audit.events"]
    group_id => "logstash_siem_consumer"
    codec => json
    security_protocol => "SSL"
    ssl_truststore_location => "/etc/logstash/certs/kafka.truststore.jks"
    ssl_truststore_password => "${KAFKA_TS_PASSWORD}"
  }
}

filter {
  # Add ingestion timestamp for latency calculation (MTTD tracking)
  mutate {
    add_field => { "ingest_timestamp" => "%{@timestamp}" }
  }

  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geo"
    }
    # Anomaly: Internal IPs shouldn't resolve externally, but if they do, tag them
  }

  if [action] == "auth_failed" {
    mutate { add_tag => ["potential_brute_force"] }
  }
}

output {
  elasticsearch {
    hosts => ["https://elasticsearch-master:9200"]
    index => "snisid-logs-%{+YYYY.MM.dd}"
    user => "${ELASTIC_USER}"
    password => "${ELASTIC_PASSWORD}"
    ssl_certificate_verification => true
    cacert => "/etc/logstash/certs/ca.crt"
    # Route to ILM policy
    ilm_enabled => true
    ilm_rollover_alias => "snisid-logs"
    ilm_pattern => "000001"
    ilm_policy => "snisid_retention_policy"
  }
}
