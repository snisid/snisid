openapi: "3.0.3"
info:
  title: SNISID Identity API
  description: National Identity Management System — CQRS/Event-Sourcing Identity API
  version: "1.0.0"
  contact:
    name: SNISID Engineering
    url: https://snisid.gouv.ht
servers:
  - url: http://localhost:8081
    description: Identity API (Go)
  - url: http://localhost:8000
    description: Identity API (Python FastAPI)
paths:
  /healthz:
    get:
      summary: Health check
      tags: [Health]
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
  /v1/identities:
    post:
      summary: Create a new identity
      tags: [Identities]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIdentityRequest"
      responses:
        "201":
          description: Identity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
    get:
      summary: Search identities
      tags: [Identities]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: agencyId
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Paginated identity list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
  /v1/identities/{id}:
    get:
      summary: Get identity by ID
      tags: [Identities]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Identity details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityDetail"
    put:
      summary: Update identity
      tags: [Identities]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName: { type: string }
                lastName: { type: string }
                email: { type: string }
                phone: { type: string }
                address: { type: object }
      responses:
        "200":
          description: Identity updated
  /v1/identities/{id}/verify:
    post:
      summary: Verify an identity
      tags: [Identities]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                verificationMethod: { type: string, default: "biometric" }
                verifierId: { type: string }
      responses:
        "200":
          description: Identity verified
  /v1/identities/{id}/suspend:
    post:
      summary: Suspend an identity
      tags: [Identities]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Identity suspended
  /v1/identities/{id}/revoke:
    post:
      summary: Revoke an identity
      tags: [Identities]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Identity revoked
  /v1/identities/{id}/flag:
    post:
      summary: Flag an identity as suspicious
      tags: [Identities]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Identity flagged
  /v1/identities/{id}/history:
    get:
      summary: Get identity event history
      tags: [Identities]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Event history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdentityHistoryEntry"
  /v1/identities/stats:
    get:
      summary: Get identity statistics
      tags: [Identities]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: agencyId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Identity statistics
  /v1/enrollments:
    post:
      summary: Create a new enrollment
      tags: [Enrollments]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnrollmentRequest"
      responses:
        "201":
          description: Enrollment created
    get:
      summary: Search enrollments
      tags: [Enrollments]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: agencyId
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Paginated enrollment list
  /v1/enrollments/{id}:
    get:
      summary: Get enrollment by ID
      tags: [Enrollments]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Enrollment details
  /v1/enrollments/{id}/biometrics:
    post:
      summary: Capture biometrics for enrollment
      tags: [Enrollments]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                biometricHash: { type: string }
                qualityScore: { type: number }
      responses:
        "200":
          description: Biometrics captured
  /v1/enrollments/{id}/verify:
    post:
      summary: Verify enrollment and generate NNU
      tags: [Enrollments]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                otpVerified: { type: boolean }
      responses:
        "200":
          description: Enrollment verified, NNU generated
  /v1/enrollments/{id}/complete:
    post:
      summary: Complete enrollment
      tags: [Enrollments]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Enrollment completed
  /v1/enrollments/{id}/reject:
    post:
      summary: Reject enrollment
      tags: [Enrollments]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Enrollment rejected
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Identity:
      type: object
      properties:
        id: { type: string }
        nationalId: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        status: { type: string, enum: [pending, active, suspended, deceased] }
        version: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    IdentityDetail:
      allOf:
        - $ref: "#/components/schemas/Identity"
        - type: object
          properties:
            middleName: { type: string }
            dateOfBirth: { type: string }
            placeOfBirth: { type: string }
            gender: { type: string }
            nationality: { type: string }
            email: { type: string }
            phone: { type: string }
            address: { type: object }
            documents:
              type: array
              items:
                $ref: "#/components/schemas/Document"
            biometrics:
              type: array
              items:
                $ref: "#/components/schemas/Biometric"
    Document:
      type: object
      properties:
        id: { type: string }
        documentType: { type: string }
        documentNumber: { type: string }
        issueDate: { type: string }
        expiryDate: { type: string }
        status: { type: string }
    Biometric:
      type: object
      properties:
        id: { type: string }
        biometricType: { type: string }
        qualityScore: { type: number }
        isPrimary: { type: boolean }
        capturedAt: { type: string, format: date-time }
    IdentityHistoryEntry:
      type: object
      properties:
        eventId: { type: string }
        eventType: { type: string }
        version: { type: integer }
        timestamp: { type: string, format: date-time }
        actorId: { type: string }
        data: { type: object }
    PaginatedResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Identity"
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }
        totalPages: { type: integer }
        _links: { type: object }
    CreateIdentityRequest:
      type: object
      required: [firstName, lastName, dateOfBirth, placeOfBirth, gender, nationality, agencyId]
      properties:
        firstName: { type: string }
        lastName: { type: string }
        dateOfBirth: { type: string, pattern: "^\\\\d{4}-\\\\d{2}-\\\\d{2}$" }
        placeOfBirth: { type: string }
        gender: { type: string, enum: [male, female, other] }
        nationality: { type: string, example: "HTI" }
        agencyId: { type: string }
        agentId: { type: string }
        consentGiven: { type: boolean }
    CreateEnrollmentRequest:
      type: object
      required: [firstName, lastName, dateOfBirth, gender, nationality, agencyId, agentId]
      properties:
        firstName: { type: string }
        lastName: { type: string }
        dateOfBirth: { type: string }
        placeOfBirth: { type: string }
        gender: { type: string }
        nationality: { type: string }
        email: { type: string }
        phone: { type: string }
        address: { type: object }
        agencyId: { type: string }
        agentId: { type: string }
        deviceId: { type: string }
        locationId: { type: string }
        consentGiven: { type: boolean }
        offlineSync: { type: boolean }
