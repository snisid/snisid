openapi: 3.0.3
info:
  title: HUMINT-HT Source Management API
  version: 1.0.0
  description: HUMINT source management microservice for SNISID

servers:
  - url: http://localhost:8302/api/v1/humint

paths:
  /sources:
    post:
      tags: [Sources]
      summary: Register a new source
      operationId: createSource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSourceRequest'
      responses:
        '201':
          description: Source created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceResponse'

  /sources/{code}/credibility:
    patch:
      tags: [Sources]
      summary: Update source credibility rating
      operationId: updateCredibility
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCredibilityRequest'
      responses:
        '200':
          description: Credibility updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceResponse'

  /sources/{code}/reports:
    get:
      tags: [Reports]
      summary: Get reports by source code
      operationId: getReportsBySource
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reports list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportsResponse'

  /reports:
    post:
      tags: [Reports]
      summary: Submit an intelligence report
      operationId: submitReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitReportRequest'
      responses:
        '201':
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'

  /debriefings:
    post:
      tags: [Debriefings]
      summary: Log a debriefing session
      operationId: logDebriefing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogDebriefingRequest'
      responses:
        '201':
          description: Debriefing logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebriefingResponse'

  /sources/high-risk:
    get:
      tags: [Sources]
      summary: Get high-risk sources
      operationId: getHighRiskSources
      responses:
        '200':
          description: High-risk sources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HighRiskResponse'

  /analytics/source-network:
    get:
      tags: [Analytics]
      summary: Source network graph link analysis
      operationId: getSourceNetwork
      responses:
        '200':
          description: Source network graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceNetworkResponse'

components:
  schemas:
    CreateSourceRequest:
      type: object
      required: [code_name, credibility_rating, reliability_rating, handling_officer_id, risk_level]
      properties:
        code_name:
          type: string
        credibility_rating:
          type: integer
          minimum: 1
          maximum: 6
        reliability_rating:
          type: string
        handling_officer_id:
          type: string
          format: uuid
        payment_amount:
          type: number
        payment_frequency:
          type: string
          enum: [ONE_TIME, MONTHLY, PER_REPORT]
        risk_level:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        compartment:
          type: string

    UpdateCredibilityRequest:
      type: object
      required: [credibility_rating]
      properties:
        credibility_rating:
          type: integer
          minimum: 1
          maximum: 6
        reliability_rating:
          type: string

    SubmitReportRequest:
      type: object
      required: [source_code, classification, content_hash]
      properties:
        source_code:
          type: string
        classification:
          type: string
          enum: [UNCLASSIFIED, CONFIDENTIAL, SECRET, TOP_SECRET]
        content_hash:
          type: string
        threat_actors:
          type: array
          items:
            type: string
        sectors_targeted:
          type: array
          items:
            type: string
        veracity_score:
          type: number
          format: float
        verified_by:
          type: array
          items:
            type: string

    LogDebriefingRequest:
      type: object
      required: [source_code, officer_id, session_date, location_method]
      properties:
        source_code:
          type: string
        officer_id:
          type: string
          format: uuid
        session_date:
          type: string
          format: date-time
        location_method:
          type: string
          enum: [IN_PERSON, PHONE, ENCRYPTED_APP, DEAD_DROP]
        topics_covered:
          type: array
          items:
            type: string
        next_meeting_planned_at:
          type: string
          format: date-time
        risk_assessment:
          type: string

    Source:
      type: object
      properties:
        code_name:
          type: string
        credibility_rating:
          type: integer
        reliability_rating:
          type: string
        status:
          type: string
        handling_officer_id:
          type: string
          format: uuid
        payment_amount:
          type: number
        payment_frequency:
          type: string
        risk_level:
          type: string
        compartment:
          type: string
        reports_count:
          type: integer
        first_recruited_at:
          type: string
          format: date-time
        last_contact_at:
          type: string
          format: date-time

    IntelligenceReport:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source_code:
          type: string
        classification:
          type: string
        content_hash:
          type: string
        threat_actors:
          type: array
          items:
            type: string
        sectors_targeted:
          type: array
          items:
            type: string
        veracity_score:
          type: number
        verified_by:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    DebriefingSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source_code:
          type: string
        officer_id:
          type: string
          format: uuid
        session_date:
          type: string
          format: date-time
        location_method:
          type: string
        topics_covered:
          type: array
          items:
            type: string
        next_meeting_planned_at:
          type: string
          format: date-time
        risk_assessment:
          type: string

    SourceResponse:
      type: object
      properties:
        source:
          $ref: '#/components/schemas/Source'

    ReportsResponse:
      type: object
      properties:
        reports:
          type: array
          items:
            $ref: '#/components/schemas/IntelligenceReport'
        total:
          type: integer

    ReportResponse:
      type: object
      properties:
        report:
          $ref: '#/components/schemas/IntelligenceReport'

    DebriefingResponse:
      type: object
      properties:
        debriefing:
          $ref: '#/components/schemas/DebriefingSession'

    HighRiskResponse:
      type: object
      properties:
        sources:
          type: array
          items:
            $ref: '#/components/schemas/Source'
        total:
          type: integer

    SourceNetworkResponse:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/NetworkNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/NetworkEdge'

    NetworkNode:
      type: object
      properties:
        id:
          type: string
        type:
          type: string

    NetworkEdge:
      type: object
      properties:
        source:
          type: string
        target:
          type: string
        label:
          type: string
