filter {
  if [type] == "keycloak" {
    json {
      source => "message"
      target => "parsed_json"
      remove_field => ["message"]
    }

    # Normalize strictly to Elastic Common Schema (ECS)
    mutate {
      add_field => {
        "[event][module]" => "keycloak"
        "[event][dataset]" => "keycloak.audit"
        "[event][kind]" => "event"
        "[event][category]" => "authentication"
      }
      rename => {
        "[parsed_json][type]" => "[event][action]"
        "[parsed_json][time]" => "@timestamp"
        "[parsed_json][ipAddress]" => "[source][ip]"
        "[parsed_json][userId]" => "[user][id]"
        "[parsed_json][clientId]" => "[client][id]"
        "[parsed_json][details][username]" => "[user][name]"
      }
    }

    # Map Keycloak outcome to ECS outcome
    if [event][action] =~ /.*_ERROR/ {
      mutate { replace => { "[event][outcome]" => "failure" } }
    } else {
      mutate { replace => { "[event][outcome]" => "success" } }
    }

    # Extract location if GeoIP is available
    geoip {
      source => "[source][ip]"
      target => "[source][geo]"
    }
    
    # Cleanup temporary parsed fields
    mutate { remove_field => ["parsed_json"] }
  }
}
