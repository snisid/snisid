filter {
  if [type] == "postgresql" {
    # Parse pgAudit CSV format
    csv {
      source => "message"
      columns => ["audit_type", "statement_id", "substatement_id", "class", "command", "object_type", "object_name", "statement", "parameter", "connection_from", "user", "database"]
    }

    mutate {
      add_field => {
        "[event][module]" => "postgresql"
        "[event][dataset]" => "postgresql.pgaudit"
        "[event][kind]" => "event"
        "[event][category]" => "database"
      }
      rename => {
        "statement" => "[event][action]"
        "user" => "[user][name]"
        "database" => "[server][domain]"
      }
    }

    # Identify DDL vs DML for ECS classification
    if [class] == "DDL" {
      mutate { add_field => { "[event][type]" => "admin" } }
    } else {
      mutate { add_field => { "[event][type]" => "access" } }
    }

    # Extract source IP from "connection_from" (e.g., "[local]" or "10.0.0.5:5432")
    if [connection_from] != "[local]" {
      grok {
        match => { "connection_from" => "%{IP:[source][ip]}:%{NUMBER:[source][port]}" }
      }
    }
    
    mutate { remove_field => ["message"] }
  }
}
