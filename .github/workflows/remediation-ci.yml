name: SNISID Remediation CI/CD
on:
  push:
    branches: [main, remediation-main, 'release/*']
  pull_request:
    branches: [main, remediation-main]
jobs:
  # ==================== LINT ====================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.4'
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Lint Go
      run: |
        go vet ./... 2>&1 || echo "go vet completed with warnings"
    - name: Lint Python
      run: |
        pip install ruff
        ruff check backend/ services/biometric/ SNI-SIDE/
    - name: Check formatting
      run: |
        go fmt ./...
        ruff format --check backend/ services/biometric/ SNI-SIDE/

  # ==================== SECRET SCAN ====================
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: GitLeaks
      uses: gitleaks/gitleaks-action@v2
    - name: TruffleHog
      continue-on-error: true
      run: |
        docker run --rm -v "$(pwd):/repo" trufflesecurity/trufflehog:latest \
          filesystem --directory=/repo --no-update
    - name: Check for hardcoded secrets
      continue-on-error: true
      run: |
        echo "Checking for forbidden patterns..."
        grep -r "password\s*[:=]\s*['\"][^'\"]+['\"]" --include="*.go" --include="*.py" --include="*.yaml" --include="*.yml" \
          --exclude-dir=node_modules --exclude-dir=.git \
          || echo "No hardcoded secrets found (or check not applicable)"

  # ==================== DEPENDENCY SCAN ====================
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: sarif
        output: trivy-results.sarif
        severity: CRITICAL,HIGH
    - name: Upload Trivy results
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-results.sarif
    - name: Syft SBOM
      uses: anchore/sbom-action@v0
      with:
        artifact-name: snisid-sbom.json

  # ==================== TEST ====================
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: snisid_test
          POSTGRES_USER: snisid_test
          POSTGRES_PASSWORD: snisid_test
        ports:
        - 5432:5432
      redis:
        image: redis:7
        ports:
        - 6379:6379
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.4'
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Go tests
      continue-on-error: true
      run: go test ./... -v -count=1 -timeout 300s
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: snisid_test
        DB_PASSWORD: snisid_test
        DB_NAME: snisid_test
        REDIS_ADDR: localhost:6379
    - name: Python tests
      run: |
        cd backend
        pip install -r requirements.txt
        python -m pytest tests/ -v

  # ==================== BUILD ====================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, secret-scan]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.4'
    - name: Build Go
      run: go build ./...
    - name: Build Docker
      run: |
        docker compose build
        docker compose run --rm go-build go build ./...
    - name: Trivy image scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: image
        image-ref: 'snisid-core:latest'
        format: sarif
        output: trivy-image-results.sarif
        severity: CRITICAL,HIGH

  # ==================== DEPLOY (STAGING) ====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/remediation-main'
    environment: staging
    steps:
    - uses: actions/checkout@v4
    - name: Configure K8s context
      uses: azure/setup-kubectl@v4
    - name: Deploy Helm
      run: |
        helm upgrade --install snisid-core deployments/helm/ \
          --namespace snisid --create-namespace \
          --values deployments/helm/values-staging.yaml \
          --set image.tag=${{ github.sha }}

  # ==================== DEPLOY (PRODUCTION) ====================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
    - uses: actions/checkout@v4
    - name: Verify signed tag
      run: |
        git verify-tag ${{ github.ref_name }}
    - name: Deploy Helm
      run: |
        helm upgrade --install snisid-core deployments/helm/ \
          --namespace snisid --create-namespace \
          --values deployments/helm/values-production.yaml \
          --set image.tag=${{ github.ref_name }}
    - name: ArgoCD Sync
      run: |
        argocd app sync snisid-core
        argocd app wait snisid-core --health
