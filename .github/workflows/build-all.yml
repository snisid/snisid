name: Build All Services

on:
  workflow_dispatch:

jobs:
  build-all:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - id-core
          - civil-ht
          - bio-ht
          - card-ht
          - pki-ht
          - iam-ht
          - interop-ht
          - infra-ht
          - cyber-ht
          - offline-ht
          - field-ht
          - data-ht
          - api-ht
          - foves-ht
          - lapi-ht
          - fpr-ht
          - sigint-ht
          - humint-ht
          - air-defense-ht
          - mil-c2-ht
          - bio-surveillance-ht
          - executive-protection-ht
          - transport-security-ht
          - radiation-safety-svc
          - all-source-fusion-ht
          - counterintel-ht
          - critical-infra-protection-ht
          - fisa-court-svc
          - classification-mgmt-ht
          - hsm-svc
          - enrollment-svc
          - card-svc
          - certification-svc
          - mdl-svc
          - age-verification-svc
          - employee-verify-svc
          - dr-svc
          - fips-cert-svc
          - pki-bridge-svc
          - bug-bounty-svc
          - accessibility-svc
          - service-desk-svc
          - audit-svc
          - sla-svc
          - governance-svc
      max-parallel: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build ${{ matrix.service }}
        run: |
          cd services/${{ matrix.service }}
          go mod tidy
          go build -o /dev/null ./cmd
      - name: Test ${{ matrix.service }}
        run: |
          cd services/${{ matrix.service }}
          go test ./internal/... -v -count=1 -cover
