name: SNISID - Scan Secrets Gitleaks
on: [push, pull_request]
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
      - name: Scan historique Git complet
        run: |
          gitleaks detect --source . --log-opts="--all" \
            --report-format json --report-path gitleaks-history.json
          FINDINGS=$(jq length gitleaks-history.json 2>/dev/null || echo 0)
          if [ "$FINDINGS" -gt 0 ]; then
            echo "ERREUR: $FINDINGS secret(s) detecte(s) dans historique Git!"
            exit 1
          fi
          echo "OK: Aucun secret detecte"
