name: SSI Backend — Tests & Lint

on:
  push:
    branches: [main, staging]
    paths: ["backend/**"]
  pull_request:
    branches: [main]
    paths: ["backend/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: snisid_test
          POSTGRES_USER: snisid
          POSTGRES_PASSWORD: test_pwd
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready -U snisid
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov aiosqlite

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check backend/ --output-format=github

      - name: Type check with mypy
        run: |
          pip install mypy pydantic
          mypy backend/ --ignore-missing-imports || true

      - name: Run tests
        env:
          PYTHONPATH: backend
          SNISID_ENVIRONMENT: development
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: snisid_test
          DB_USER: snisid
          DB_PASSWORD: test_pwd
        run: |
          pytest backend/tests/ -v --tb=short --ignore=backend/tests/phase15 --ignore=backend/tests/phase14 -x

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: .coverage
          if-no-files-found: ignore
