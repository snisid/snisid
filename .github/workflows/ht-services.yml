      - 'services/terr-svc/**'
      - 'services/sanc-svc/**'
      - 'services/reso-svc/**'
      - 'services/siar-svc/**'
      - 'services/biar-svc/**'
      - 'services/expl-svc/**'
      - 'services/trafar-svc/**'
      - 'services/sifr-svc/**'
      - 'services/mar-svc/**'
      - 'services/sltd-svc/**'
      - 'services/blkl-svc/**'
      - 'services/aero-svc/**'
