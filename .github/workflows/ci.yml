name: CI / Security Scanning

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  secrets-scan:
    name: Secrets & Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./

  sast-sca:
    name: SAST & SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Semgrep SAST
        continue-on-error: true
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      
      - name: Install dependencies
        run: pip install -r backend/requirements.txt bandit safety
      
      - name: Run Bandit
        run: bandit -r backend/ -f json -o bandit-report.json || true
        
      - name: Run Safety SCA
        run: safety check -r backend/requirements.txt
        
      - name: Setup Node
        continue-on-error: true
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          
      - name: NPM Audit
        continue-on-error: true
        run: npm audit --audit-level=high || true
        working-directory: ./frontend

  quality-gate:
    name: Tests & SonarQube
    runs-on: ubuntu-latest
    needs: [sast-sca]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Environment
        continue-on-error: true
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          
      - name: Run Frontend Tests
        continue-on-error: true
        working-directory: ./frontend
        run: |
          npm install
          npm run test -- --coverage || true
          
      # In a real environment, Python tests would be run here too generating coverage.xml
          
      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # The Sonar properties file should define the 90% coverage quality gate.
