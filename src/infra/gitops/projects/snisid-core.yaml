apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: snisid-core
  namespace: argocd
spec:
  description: "SNISID Core Microservices Project"
  sourceRepos:
  - '*'
  destinations:
  - namespace: snisid-core
    server: https://kubernetes.default.svc
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
