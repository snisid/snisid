expose:
  type: ingress
  tls:
    enabled: true
    certSource: secret
    secret:
      secretName: harbor-tls-cert
  ingress:
    hosts:
      core: snisid-registry.local
    annotations:
      kubernetes.io/ingress.class: "nginx"
      nginx.ingress.kubernetes.io/proxy-body-size: "0"

persistence:
  enabled: true
  resourcePolicy: "keep"
  imageChartStorage:
    type: s3
    s3:
      region: snisid-dc1
      bucket: harbor-registry-worm
      accesskey: ${S3_ACCESS_KEY}
      secretkey: ${S3_SECRET_KEY}
      regionendpoint: https://ceph.snisid.local:8080
      encrypt: true
      secure: true

trivy:
  enabled: true
  offlineScan: true

cosign:
  enabled: true

notary:
  enabled: false # Replaced by modern cosign

metrics:
  enabled: true
  podMonitor:
    enabled: true
