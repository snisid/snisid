name: SNISID GitOps Continuous Deployment

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/services/**'

jobs:
  deploy-to-argocd:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    # Only run if the SAST and Build pipelines pass
    needs: [sast-go, secrets-scan, build-and-sign]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITOPS_PAT }}

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.1.1"

      - name: Update Kubernetes Image Manifests
        run: |
          # Read the SHA256 digest outputted by the build-and-sign job
          IMAGE_DIGEST=${{ needs.build-and-sign.outputs.image_digest }}
          
          cd src/infra/gitops/base/identity-service
          kustomize edit set image harbor.snisid.local/core/identity-service@${IMAGE_DIGEST}

      - name: Commit and Push GitOps Changes
        run: |
          git config --global user.name "snisid-cd-bot"
          git config --global user.email "cd-bot@snisid.gov"
          
          git commit -am "Automated GitOps Deployment: identity-service to ${IMAGE_DIGEST}"
          git push
          
          echo "Successfully pushed image updates to Git. ArgoCD will now sync the cluster."
