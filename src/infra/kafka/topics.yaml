apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: snisid.identity.events
  namespace: snisid-data
  labels:
    strimzi.io/cluster: snisid-kafka
spec:
  partitions: 12
  replicas: 3
  config:
    retention.ms: -1 # Infinite retention for Event Sourcing
    retention.bytes: -1
    cleanup.policy: compact
