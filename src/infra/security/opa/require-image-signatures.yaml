apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiresignatures
spec:
  crd:
    spec:
      names:
        kind: K8sRequireSignatures
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiresignatures

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not startswith(container.image, "snisid-registry.local/")
          msg := sprintf("Container image %v is not from the authorized sovereign registry. Deployment blocked.", [container.image])
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequireSignatures
metadata:
  name: require-sovereign-images
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces:
      - "snisid-core"
