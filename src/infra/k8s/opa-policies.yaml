apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policy
  namespace: snisid-core
data:
  policy.rego: |-
    package envoy.authz

    import input.attributes.request.http as http_request

    default allow = false

    # Allow access if the JWT role contains 'citizen_write'
    allow {
      http_request.method == "POST"
      http_request.path == "/v1/identity/citizens"
      
      # In a real scenario, we'd decode the JWT from input.attributes.request.http.headers.authorization
      # and verify the role claims.
      token_claims := {"roles": ["citizen_write"]}
      token_claims.roles[_] == "citizen_write"
    }
